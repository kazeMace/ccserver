meta: {title: 棋盘类最小样例}
runtime: {type: game_session, config: {}}
extensions:
  board: {enabled: true}
concepts:
  roles: {player: {display_name: 玩家, description: 棋盘玩家}}
  factions: {neutral: {display_name: 中立, description: 中立阵营}}
  scopes: {public: {display_name: 公开, description: 全员可见}}
roles:
  - {name: player, display_name: 玩家, faction: neutral, brief: 你是棋盘玩家。}
players:
  count: 2
  casting: {type: shuffle, distribution: {player: 2}}
scopes:
  - {name: public, members: all}
initial_state:
  GAME:
    board_state: {}
flow:
  loop: false
  scenes:
    - name: board-move
      display_name: 棋盘行动
      scene_type: board
      scope: public
      participants: {filter: {alive: true}}
      dialogue_policy: {mode: single}
      action_policy:
        kind: board_move
        input: {widget: board_move}
      response:
        mode: structured
        schema: move
        cue: 请提交一个通用棋盘动作。
      resolution:
        effects:
          - type: rule_set_apply
            result_path: GAME.last_rule_result
      publication:
        views:
          - id: board-view
            kind: board
            audience: public
            data: {state: {ref: GAME.board_state}}
referee: {win_conditions: []}
