meta: {title: 词语派对最小样例}
runtime: game_session
game_pack:
  plugin: builtin.party.free_discussion
  config: {}
concepts:
  roles: {player: {display_name: 玩家, description: 词语游戏玩家}}
  factions: {neutral: {display_name: 中立, description: 中立阵营}}
  scopes: {public: {display_name: 公开, description: 全员可见}}
roles:
  - {name: player, display_name: 玩家, faction: neutral, brief: 你要通过发言隐藏或推理身份。}
players:
  count: 3
  casting: {type: shuffle, distribution: {player: 3}}
scopes:
  - {name: public, members: all}
flow:
  loop: false
  scenes:
    - name: free-discussion
      display_name: 自由讨论
      scene_type: speak
      scope: public
      participants: all
      dialogue_policy:
        mode: openchat
        rounds: 2
        speakers_per_round: 2
      response:
        mode: text
        cue: 请围绕你的词语线索自由讨论，但不要直接暴露答案。
    - name: vote-out
      display_name: 投票指出嫌疑人
      scene_type: vote
      scope: public
      participants: all
      candidates:
        filter: {alive: true}
        when:
          value: {ref: candidate}
          not_equal: {ref: actor}
      action_policy: {kind: vote, target: required, input: {widget: player_select}}
      response: {mode: structured, schema: vote, cue: 请投票指出你认为最可疑的人。}
      resolution:
        selection: {tie_policy: no_winner}
referee: {win_conditions: []}
