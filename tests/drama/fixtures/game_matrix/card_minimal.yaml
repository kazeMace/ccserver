meta: {title: 卡牌类最小样例}
runtime: {type: game_session, config: {}}
extensions:
  cards: {enabled: true}
concepts:
  roles: {player: {display_name: 玩家, description: 卡牌玩家}}
  factions: {neutral: {display_name: 中立, description: 中立阵营}}
  scopes: {public: {display_name: 公开, description: 全员可见}}
roles:
  - {name: player, display_name: 玩家, faction: neutral, brief: 你是卡牌玩家。}
players:
  count: 2
  casting: {type: shuffle, distribution: {player: 2}}
scopes:
  - {name: public, members: all}
initial_state:
  GAME:
    active_player: Player_1
flow:
  loop: false
  scenes:
    - name: card-action
      display_name: 卡牌行动
      scene_type: card
      scope: public
      participants:
        from_state: GAME.active_player
      dialogue_policy: {mode: single}
      action_policy:
        kind: card_action
        input: {widget: card_select}
      response:
        mode: structured
        schema: card_action
        cue: 请提交一个通用卡牌动作。
      resolution:
        effects:
          - type: rule_set_apply
            result_path: GAME.last_rule_result
      publication:
        views:
          - id: hand-view
            kind: cards
            audience: public
            data: {owner: {ref: GAME.active_player}}
referee: {win_conditions: []}
