meta: {title: 剧情类最小样例}
runtime: {type: game_session, config: {}}
extensions:
  story: {enabled: true}
concepts:
  roles: {adventurer: {display_name: 冒险者, description: 参与剧情的玩家}}
  factions: {party: {display_name: 队伍, description: 冒险队伍}}
  scopes: {public: {display_name: 公开, description: 全员可见}}
roles:
  - {name: adventurer, display_name: 冒险者, faction: party, brief: 你是一名冒险者。}
players:
  count: 2
  casting: {type: shuffle, distribution: {adventurer: 2}}
scopes:
  - {name: public, members: all}
flow:
  loop: false
  scenes:
    - name: story-choice
      display_name: 剧情选择
      scene_type: story
      scope: public
      participants: all
      dialogue_policy: {mode: sequential}
      response:
        mode: text
        cue: 你们来到岔路口，请描述你的选择和理由。
      resolution:
        effects:
          - type: rule_set_apply
            result_path: GAME.last_rule_result
      publication:
        views:
          - id: quest-log
            kind: markdown
            audience: public
            data: {text: 当前任务：找到出口。}
referee: {win_conditions: []}
