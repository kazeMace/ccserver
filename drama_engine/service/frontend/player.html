<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>狼人杀玩家页</title>
  <link rel="stylesheet" href="/frontend/simple.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <h1>狼人杀玩家页</h1>
      <span id="status" class="pill">连接中</span>
    </header>
    <section class="card">
      <h2>我的身份</h2>
      <div id="roleCard" class="role-card muted">等待发牌</div>
      <div id="scopes" class="tags"></div>
    </section>
    <section class="card">
      <h2>玩家列表</h2>
      <div id="seats" class="seat-list"></div>
    </section>
    <section class="card">
      <h2>我的消息</h2>
      <div id="timeline" class="timeline"></div>
    </section>
    <section class="card action-card">
      <h2>当前操作</h2>
      <div id="actionBox" class="muted">暂无待处理操作</div>
    </section>
  </main>
  <script src="/frontend/player.js"></script>
</body>
</html>
