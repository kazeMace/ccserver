meta:
  title: 多 Agent 圆桌群聊 Lite
  description: 使用 group_chat 执行模型的基础群聊样例，围绕一个主题进行多轮观点交换。
  min_players: 3
  max_players: 3
runtime:
  type: group_chat
  config:
    room_name: product-roundtable
    topic: 新派对游戏的核心乐趣是什么
    max_rounds: 2
    role_prompts:
      Player_1: 主持人先收束议题，并追问一个具体设计风险
      Player_2: 设计师提出一个核心机制和玩家反馈循环
      Player_3: 测试员指出一个规则漏洞和验证办法
concepts:
  roles:
    moderator:
      display_name: 主持人
      description: 控制话题节奏并总结观点。
    designer:
      display_name: 设计师
      description: 提出玩法机制和用户体验观点。
    tester:
      display_name: 测试员
      description: 从可玩性和规则漏洞角度反馈。
  factions:
    room:
      display_name: 群聊成员
      description: 围绕同一议题协作讨论。
  scopes:
    public:
      display_name: 群聊频道
      description: 群聊成员都可见的消息流。
  abilities:
    speak:
      display_name: 发言
      description: 围绕主题发表观点。
      prompt: 发言要围绕主题，指出一个具体观点或问题。
roles:
- name: moderator
  display_name: 主持人
  faction: room
  brief: 你负责组织讨论，并在必要时追问。
  scopes:
  - public
  abilities:
  - speak
- name: designer
  display_name: 设计师
  faction: room
  brief: 你关注玩法机制、交互体验和节奏。
  scopes:
  - public
  abilities:
  - speak
- name: tester
  display_name: 测试员
  faction: room
  brief: 你关注规则漏洞、边界情况和实际可玩性。
  scopes:
  - public
  abilities:
  - speak
players:
  count: 3
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      moderator: 1
      designer: 1
      tester: 1
scopes:
- name: public
  members: all
flow:
  loop: false
  scenes:
  - name: fallback-preview
    display_name: 群聊预览
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: group_chat 执行模型会根据 runtime.config 创建群聊房间并推进多轮消息。
referee:
  conditions: []
  check_on:
  - after_scene
