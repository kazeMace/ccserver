meta:
  title: 象棋
  description: 可直接运行的象棋脚本：红黑双方交替提交 from/to 坐标，rule_set 写入棋盘移动，并在吃到将/帅时写入赢家。
  min_players: 2
  max_players: 2
runtime:
  type: game_session
extensions:
  board:
    enabled: true
    version: '0.1'
    config:
      boards:
        main:
          type: grid
          rows: 10
          cols: 9
          coordinate_system: xiangqi
rule_set:
  plugin: builtin.board.xiangqi_lite
  config:
    objective: capture_general
concepts:
  roles:
    red:
      display_name: 红方
      description: 先手行棋，目标将死黑将。
    black:
      display_name: 黑方
      description: 后手行棋，目标将死红帅。
  factions:
    red_side:
      display_name: 红方
      description: 红方阵营。
    black_side:
      display_name: 黑方
      description: 黑方阵营。
  scopes:
    public:
      display_name: 棋盘
      description: 双方可见的象棋棋盘。
  abilities:
    move_piece:
      display_name: 走子
      description: 移动一枚己方棋子。
      prompt: 按棋子规则提交 from/to 坐标，并说明战术意图。
roles:
- name: red
  display_name: 红方
  faction: red_side
  brief: 你执红先手，目标保护己方帅并将死对方将。
  scopes:
  - public
  abilities:
  - move_piece
- name: black
  display_name: 黑方
  faction: black_side
  brief: 你执黑后手，目标保护己方将并将死对方帅。
  scopes:
  - public
  abilities:
  - move_piece
players:
  count: 2
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      red: 1
      black: 1
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: board-setup
    display_name: 摆棋
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统按标准象棋初始布局摆放棋子，红方先行。手动运行时可把棋盘写入 GAME.xiangqi_board，key 为 row,col，value 为棋子名。
    publication:
      views:
      - id: xiangqi-board
        kind: board
        title: 象棋棋盘
        audience: public
        data:
          board:
            ref: GAME.xiangqi_board
          rows_count: 10
          cols_count: 9
      - id: xiangqi-status
        kind: key-value
        title: 象棋状态
        audience: public
        data:
          rows:
          - label: 赢家
            value:
              ref: GAME.winner
          - label: 胜利条件
            value:
              ref: GAME.winning_condition
  - name: red-move
    display_name: 红方走子
    scene_type: board
    scope: public
    participants:
      filter:
        left: role
        op: equal
        right: red
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      cue: 红方提交一步走子，包含 from 和 to 坐标，例如 from=[9,0], to=[8,0]。吃到对方 general/king/shuai/jiang 时获胜。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_board_rule_result
    publication:
      views:
      - id: xiangqi-last-result
        kind: key-value
        title: 最近走子
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_board_rule_result
  - name: black-move
    display_name: 黑方走子
    scene_type: board
    scope: public
    participants:
      filter:
        left: role
        op: equal
        right: black
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      cue: 黑方提交一步走子，包含 from 和 to 坐标，例如 from=[0,0], to=[1,0]。吃到对方 general/king/shuai/jiang 时获胜。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_board_rule_result
    publication:
      views:
      - id: xiangqi-last-result
        kind: key-value
        title: 最近走子
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_board_rule_result
referee:
  conditions: []
  check_on:
  - after_scene
