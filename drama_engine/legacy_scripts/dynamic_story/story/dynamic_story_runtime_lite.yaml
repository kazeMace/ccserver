meta:
  title: Dynamic Story 种子冒险
  description: 使用 dynamic_story 执行模型的基础动态剧情样例，按 runtime beats 生成故事记忆。
  min_players: 2
  max_players: 3
runtime:
  type: dynamic_story
  config:
    world:
      name: mist-harbor
    world_state:
      last_location: fog_harbor
      threat: blue_fire
    premise: 玩家在雾港寻找失踪的灯塔守卫
    beats:
    - 雾港的钟声在午夜响起，所有船只都失去方向。
    - 玩家发现灯塔地下有一张被海水浸湿的旧航图。
    - DM 要求玩家决定是修复灯塔，还是追踪海面上的蓝色火光。
    free_actions:
    - beat: 1
      text: 调查午夜钟声的来源
    - beat: 2
      text: 询问码头工人旧航图的来历
concepts:
  roles:
    adventurer:
      display_name: 冒险者
      description: 在动态剧情中提出行动并推动故事。
  factions:
    party:
      display_name: 冒险小队
      description: 协作探索雾港真相。
  scopes:
    public:
      display_name: 故事频道
      description: 玩家和 DM 都可见的故事流。
  abilities:
    act:
      display_name: 行动
      description: 描述角色在当前场景中的行动。
      prompt: 行动要具体，说明目标、方法和风险。
roles:
- name: adventurer
  display_name: 冒险者
  faction: party
  brief: 你要在雾港调查失踪事件，并根据 DM 的反馈调整行动。
  scopes:
  - public
  abilities:
  - act
players:
  count: 3
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      adventurer: 3
scopes:
- name: public
  members: all
flow:
  loop: false
  scenes:
  - name: fallback-preview
    display_name: 动态剧情预览
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: dynamic_story 执行模型会根据 runtime.config.world、premise 和 beats 推进剧情。
referee:
  conditions: []
  check_on:
  - after_beat
