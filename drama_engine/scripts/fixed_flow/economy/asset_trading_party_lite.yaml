meta:
  title: 资产交易派对
  description: 可直接运行的资产交易派对脚本：玩家公开报价，接受交易后 rule_set 更新现金、资产、最近成交和破产状态。
  min_players: 3
  max_players: 5
runtime:
  type: game_session
extensions:
  economy:
    enabled: true
    version: '0.1'
    config:
      currency: coin
      assets:
      - farm
      - shop
      - factory
      - harbor
rule_set:
  plugin: builtin.economy.asset_trading_lite
  config:
    objective: highest_asset_value
    asset_values:
      farm: 120
      shop: 180
      factory: 260
      harbor: 320
concepts:
  roles:
    trader:
      display_name: 交易者
      description: 经营现金和资产，通过交易获得最高价值。
  factions:
    solo:
      display_name: 个人胜利
      description: 每名玩家独立竞争。
  scopes:
    public:
      display_name: 市场
      description: 公开报价、成交和资产状态。
  abilities:
    offer:
      display_name: 报价
      description: 提出购买、出售或交换资产的报价。
      prompt: 报价需要写清资产、价格和交易对象。
    accept:
      display_name: 接受交易
      description: 对报价选择接受或拒绝。
      prompt: 根据现金、资产组合和长期收益判断是否接受。
roles:
- name: trader
  display_name: 交易者
  faction: solo
  brief: 你要通过报价和谈判积累最高资产价值。
  scopes:
  - public
  abilities:
  - offer
  - accept
players:
  count: 4
  initial_attrs:
    alive: true
    cash: 500
    asset_count: 1
    assets: []
  casting:
    type: shuffle
    distribution:
      trader: 4
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: market-open
    display_name: 市场开盘
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统发放初始资产和现金，并公开市场资产池。手动运行时可给每名玩家写入 assets，例如 farm/shop/factory/harbor。
    publication:
      views:
      - id: market-status
        kind: key-value
        title: 市场状态
        audience: public
        data:
          rows:
          - label: 待成交报价
            value:
              ref: GAME.pending_trade
          - label: 最近成交
            value:
              ref: GAME.last_trade
  - name: make-offer
    display_name: 提出报价
    scene_type: action
    scope: public
    participants: all
    dialogue_policy:
      mode: sequential
    action_policy:
      kind: form
      input:
        widget: text
    response:
      mode: structured
      schema: custom
      fields:
        asset:
          type: string
          description: 资产名，例如 farm。
        price:
          type: int
          description: 价格。
        buyer:
          type: string
          description: 买家，例如 Player_2。
        seller:
          type: string
          description: 卖家，例如 Player_1。
      cue: 提出一个资产购买报价，填写 seller、buyer、asset、price。系统会记录为 GAME.pending_trade。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_economy_rule_result
  - name: accept-offer
    display_name: 接受或拒绝
    scene_type: action
    scope: public
    participants: all
    action_policy:
      kind: form
      input:
        widget: confirm
    response:
      mode: structured
      schema: custom
      fields:
        accept:
          type: bool
          description: 是否接受。
        seller:
          type: string
          description: 卖家。
        buyer:
          type: string
          description: 买家。
        asset:
          type: string
          description: 成交资产。
        price:
          type: int
          description: 成交价格。
      include_reason: true
      cue: 针对收到的报价选择 accept=true/false；接受时必须填写 seller、buyer、asset、price，系统会更新现金和资产。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_economy_rule_result
    publication:
      views:
      - id: trade-result
        kind: key-value
        title: 交易结算
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_economy_rule_result
          - label: 最近成交
            value:
              ref: GAME.last_trade
  - name: asset-summary
    display_name: 资产摘要
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统公布成交结果、现金变化、资产归属和当前资产排名。现金低于 0 的玩家视为经营失败出局。
referee:
  conditions: []
  check_on:
  - after_scene
