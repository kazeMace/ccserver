meta:
  title: 炸弹猫
  description: 可直接运行的 3 人炸弹猫脚本：顺序出功能牌、回合末摸牌，摸到炸弹时有拆除牌则保命，否则爆炸出局，最后存活者获胜。
  min_players: 3
  max_players: 3
runtime:
  type: game_session
extensions:
  cards:
    enabled: true
    version: '0.1'
    config:
      decks:
        main:
          catalog: exploding_kittens_lite
          shuffle: true
          deal_count: 5
rule_set:
  plugin: builtin.cards.exploding_kittens_lite
  config:
    objective: avoid_explosion
    initial_defuse_count: 1
concepts:
  roles:
    cat_player:
      display_name: 猫牌玩家
      description: 使用手牌干扰对手，避免抽到炸弹猫。
  factions:
    solo:
      display_name: 个人胜利
      description: 最后一名未爆炸玩家获胜。
  scopes:
    public:
      display_name: 牌桌
      description: 公开的摸牌、弃牌和爆炸结算区域。
    hand:
      display_name: 手牌
      description: 玩家私密查看自己的手牌。
  abilities:
    play_card:
      display_name: 出功能牌
      description: 打出跳过、攻击、预知未来等功能牌。
      prompt: 根据当前危险程度选择功能牌，优先避免自己摸到炸弹。
    draw_card:
      display_name: 摸牌
      description: 回合结束时从牌堆摸一张牌。
      prompt: 如果无法规避风险，提交摸牌动作并说明判断。
    defuse:
      display_name: 拆除炸弹
      description: 抽到炸弹猫时使用拆除牌保命。
      prompt: 如果你有拆除牌，使用它并决定把炸弹放回牌堆的位置。
roles:
- name: cat_player
  display_name: 猫牌玩家
  faction: solo
  brief: 你要用功能牌控制摸牌风险，避免抽到炸弹猫，成为最后存活者。
  scopes:
  - public
  - hand
  abilities:
  - play_card
  - draw_card
  - defuse
players:
  count: 3
  initial_attrs:
    alive: true
    hand_count: 5
    defuse_count: 1
  casting:
    type: shuffle
    distribution:
      cat_player: 3
scopes:
- name: public
  members: all
- name: hand
  members: all
flow:
  loop: true
  scenes:
  - name: setup
    display_name: 发牌与洗入炸弹
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统发放初始手牌和拆除牌，将炸弹猫洗入牌堆。手动运行时可把抽牌堆写入 GAME.kitten_draw_pile，例如 exploding-kitten、skip、attack、see-the-future。
    publication:
      views:
      - id: kitten-table-state
        kind: key-value
        title: 炸弹猫牌桌状态
        audience: public
        data:
          rows:
          - label: 最近爆炸
            value:
              ref: GAME.last_exploded_player
          - label: 攻击状态
            value:
              ref: GAME.kitten_attack_next
  - name: play-function-card
    display_name: 出功能牌
    scene_type: card
    scope: public
    participants:
      filter:
        left: alive
        op: equal
        right: true
    action_policy:
      kind: card_action
      input:
        widget: card_select
    response:
      mode: structured
      schema: card_action
      include_reason: true
      cue: '当前玩家可以出一张功能牌，也可以选择不出牌。

        提交 type=play, card=skip 可跳过摸牌；card=attack 可让下一名承受攻击；card=see-the-future 可查看牌堆前三张。

        '
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_card_rule_result
    publication:
      views:
      - id: kitten-last-card
        kind: key-value
        title: 最近功能牌
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_card_rule_result
  - name: draw-or-defuse
    display_name: 摸牌与拆除
    scene_type: card
    scope: public
    participants:
      filter:
        left: alive
        op: equal
        right: true
    action_policy:
      kind: card_action
      input:
        widget: card_select
    response:
      mode: structured
      schema: card_action
      include_reason: true
      cue: 回合结束提交 type=draw 摸牌；如果抽到 exploding-kitten，系统会优先消耗 hand 中的 defuse 或 defuse_count，否则该玩家 alive=false。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_draw_rule_result
    publication:
      views:
      - id: kitten-last-draw
        kind: key-value
        title: 最近摸牌
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_draw_rule_result
          - label: 最近爆炸
            value:
              ref: GAME.last_exploded_player
  - name: survival-summary
    display_name: 存活摘要
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统公布本回合是否有人爆炸、拆除是否成功、剩余牌堆风险和下一名玩家。若只剩一名 alive 玩家，该玩家获胜。
referee:
  conditions: []
  check_on:
  - after_scene
