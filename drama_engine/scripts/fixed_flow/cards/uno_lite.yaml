meta:
  title: UNO 卡牌局
  description: 可直接运行的 UNO 派对脚本：洗牌、发 7 张手牌、公开弃牌堆顶、顺序出牌/摸牌，并由 rule_set 处理颜色/点数匹配和功能牌效果。
  min_players: 2
  max_players: 4
runtime:
  type: game_session
extensions:
  cards:
    enabled: true
    version: '0.1'
    config:
      decks:
        main:
          catalog: uno_lite
          shuffle: true
          deal_count: 5
rule_set:
  plugin: builtin.cards.uno_lite
  config:
    objective: empty_hand
    deal_count: 7
    initial_top_card: red-5
concepts:
  roles:
    player:
      display_name: 玩家
      description: 轮流出牌或摸牌，尝试先清空手牌。
  factions:
    solo:
      display_name: 个人胜利
      description: 每名玩家独立竞争。
  scopes:
    public:
      display_name: 牌桌
      description: 所有玩家可见的弃牌堆、当前颜色和回合信息。
    hand:
      display_name: 手牌
      description: 玩家私密可见的手牌区域。
  abilities:
    play_card:
      display_name: 出牌
      description: 从手牌中选择一张牌打出。
      prompt: 选择能匹配颜色或点数的牌；没有合适牌时选择摸牌。
    draw_card:
      display_name: 摸牌
      description: 从牌堆摸一张牌。
      prompt: 无法出牌时摸牌并结束行动。
roles:
- name: player
  display_name: 玩家
  faction: solo
  brief: 你要通过出牌、摸牌和保留功能牌，尽快清空手牌。
  scopes:
  - public
  - hand
  abilities:
  - play_card
  - draw_card
players:
  count: 4
  initial_attrs:
    alive: true
    hand_count: 7
  casting:
    type: shuffle
    distribution:
      player: 4
scopes:
- name: public
  members: all
- name: hand
  members: all
flow:
  loop: true
  scenes:
  - name: deal-cards
    display_name: 发牌与翻开首牌
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统洗牌、每人发 7 张手牌，翻开弃牌堆首牌 red-5，并准备抽牌堆。若接入真实牌库，主持端应把每名玩家的 hand 写入私密状态，把 GAME.uno_top_card 写为首牌。
    publication:
      views:
      - id: uno-table-state
        kind: key-value
        title: UNO 牌桌状态
        audience: public
        data:
          rows:
          - label: 弃牌堆顶
            value:
              ref: GAME.uno_top_card
          - label: 当前方向
            value:
              ref: GAME.uno_direction
          - label: 待摸牌数
            value:
              ref: GAME.uno_pending_draw
  - name: play-or-draw
    display_name: 玩家顺序出牌或摸牌
    scene_type: card
    scope: public
    participants:
      filter:
        alive: true
    dialogue_policy:
      mode: sequential
    action_policy:
      kind: card_action
      input:
        widget: card_select
    response:
      mode: structured
      schema: card_action
      include_reason: true
      cue: '轮到你时只能做一个动作：

        1. 出牌：提交 type=play, card=red-7；这张牌必须在你的 hand 中，并且颜色/点数/功能与 GAME.uno_top_card 匹配；wild 任意可出。

        2. 摸牌：提交 type=draw；系统从 GAME.uno_draw_pile 摸一张加入你的 hand。

        功能牌效果：reverse 改变方向，skip 跳过下一名，draw-2 让下一名待摸 2，wild-draw-4 让下一名待摸 4；手牌清空时直接获胜。

        '
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_card_rule_result
    publication:
      views:
      - id: uno-last-result
        kind: key-value
        title: 本轮 UNO 结算
        audience: public
        data:
          rows:
          - label: 最后动作
            value:
              ref: GAME.last_card_rule_result
          - label: 胜利玩家
            value:
              ref: GAME.winner
  - name: round-summary
    display_name: 回合摘要
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统公布本轮所有玩家动作、弃牌堆顶牌、方向、待摸牌数和是否有人清空手牌。若 GAME.winner 不为空，本局结束；否则继续下一轮。
referee:
  conditions:
  - faction: solo
    when:
      ref: actor.hand_count
      op: less_than_equal
      value: 0
  check_on:
  - after_scene
