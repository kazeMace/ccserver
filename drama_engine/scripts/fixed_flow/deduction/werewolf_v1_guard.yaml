meta:
  title: 狼人杀v1 守卫板
  description: 12人新手守卫局：4狼4民，预言家、女巫、猎人、守卫。包含警长、PK、空刀、守卫守护与守药冲突。
  min_players: 12
  max_players: 12
runtime:
  type: game_session
  config: {}
params:
- name: total_players
  display_name: 总玩家数
  type: int
  default: 12
- name: werewolf_count
  display_name: 狼人数量
  type: int
  default: 4
vocab:
  roles:
  - werewolf
  - seer
  - witch
  - hunter
  - guard
  - villager
  factions:
  - wolf
  - good
  scopes:
  - public
  - town
  - wolf-den
  - whisper:seer
  - whisper:witch
  - whisper:guard
  abilities:
  - vote
  - kill
  - check
  - heal
  - poison
  - shoot
  - protect
  items:
  - heal_potion
  - poison_potion
  statuses:
  - alive
  - dead
concepts:
  roles:
    werewolf:
      display_name: 狼人
      description: 夜晚协同行动、白天隐藏身份的反派角色。
    seer:
      display_name: 预言家
      description: 夜晚查验身份、白天引导好人阵营推理的神职角色。
    witch:
      display_name: 女巫
      description: 拥有解药和毒药，能改变夜晚死亡结果的关键神职角色。
    hunter:
      display_name: 猎人
      description: 特定出局情形下可以开枪带走一名玩家的反制角色。
    guard:
      display_name: 守卫
      description: 夜晚守护一名玩家不被狼人刀死，不能连续两晚守护同一名玩家。
    villager:
      display_name: 村民
      description: 没有夜晚特殊能力，依靠发言、逻辑和投票找出狼人。
  factions:
    wolf:
      display_name: 狼人阵营
      description: 目标是淘汰足够多好人，使狼人数量大于或等于好人数量。
    good:
      display_name: 好人阵营
      description: 目标是找出并放逐所有狼人。
  scopes:
    public:
      display_name: 全场
      description: 所有玩家都能接收的信息区域，适合公开公告和全员可见发言。
    town:
      display_name: 城镇
      description: 当前存活玩家接收的信息区域，适合白天讨论和公开行动。
    wolf-den:
      display_name: 狼人密室
      description: 只有存活狼人能接收的信息区域，用于夜晚私密沟通。
    whisper:seer:
      display_name: 预言家私语
      description: 只有存活预言家能接收的信息区域，用于查验行动和结果。
    whisper:witch:
      display_name: 女巫私语
      description: 只有存活女巫能接收的信息区域，用于解药和毒药决策。
    whisper:guard:
      display_name: 守卫私语
      description: 只有存活守卫能接收的信息区域，用于守护行动。
  abilities:
    vote:
      display_name: 投票
      description: 在投票环节选择一名玩家作为目标，并给出判断理由。
      prompt: 你可以根据当前可见信息投票给一名玩家。投票理由要简洁、可解释，避免只盲从他人。
    kill:
      display_name: 狼人袭击
      description: 狼人夜晚共同选择一名存活玩家作为袭击目标，也可以选择自刀。
      prompt: 你需要结合白天发言和身份猜测选择袭击目标；必要时可以自刀制造信息差。
    check:
      display_name: 查验
      description: 预言家夜晚选择一名玩家，得知其阵营。
      prompt: 你每晚可查验一名玩家。优先查验发言关键、争议大或可能带队的人。
    heal:
      display_name: 解药
      description: 女巫可在夜晚救下当晚被狼人袭击的玩家，只能使用一次。
      prompt: 你拥有救人能力。使用前要判断目标是否值得救，以及是否存在狼人自刀骗药的可能。
    poison:
      display_name: 毒药
      description: 女巫可在夜晚毒死一名存活玩家，通常只能使用一次。
      prompt: 你拥有毒人能力。应谨慎选择目标，误毒好人会削弱己方阵营。
    shoot:
      display_name: 开枪
      description: 猎人在特定出局情形下可以带走一名玩家。
      prompt: 你出局时可能有一次反击机会，应优先带走你最怀疑的狼人。
    protect:
      display_name: 守护
      description: 守卫夜晚选择一名玩家守护，使其免于狼人袭击；不能连续两晚守同一人。
      prompt: 你每晚可以守护一名玩家。避免连续守同一人，也要注意守护和女巫解药可能冲突。
  items:
    heal_potion:
      display_name: 解药
      description: 女巫的一次性道具，可在夜晚救下被狼人袭击的玩家。
    poison_potion:
      display_name: 毒药
      description: 女巫的一次性道具，可在夜晚毒死一名存活玩家。
  statuses:
    alive:
      display_name: 存活
      description: 玩家仍在场上，可以参与对应阶段的发言、行动和投票。
    dead:
      display_name: 出局
      description: 玩家已离开主要行动流程，通常不能继续投票或夜晚行动。
roles:
- name: werewolf
  display_name: 狼人
  faction: wolf
  brief: '你是【狼人】。目标：与其他狼人配合，每晚袭击一名存活玩家，

    通过放逐或夜间袭击让平民全部出局，或让神职全部出局。你可以自刀。

    发言简洁，控制在 80 字内。

    '
  scopes:
  - public
  - town
  - wolf-den
  abilities:
  - vote
  - kill
- name: seer
  display_name: 预言家
  faction: good
  brief: '你是【预言家】。每晚可查验一名玩家的阵营（狼人/好人）。

    目标：找出狼人并引导好人投票淘汰他们。发言简洁，控制在 80 字内。

    '
  scopes:
  - public
  - town
  - whisper:seer
  abilities:
  - vote
  - check
- name: witch
  display_name: 女巫
  faction: good
  brief: '你是【女巫】。有一瓶解药（救活被刀的人）和一瓶毒药（毒死一名玩家），

    各用一次。解药和毒药都只能晚上使用，且同一个晚上不能既使用解药又使用毒药。

    发言简洁，80字内。

    '
  scopes:
  - public
  - town
  - whisper:witch
  abilities:
  - vote
  - heal
  - poison
  inventory:
  - item: heal_potion
    display_name: 解药
    description: 一次性道具，可在夜晚救活当晚被狼人袭击的玩家。
    count: 1
  - item: poison_potion
    display_name: 毒药
    description: 一次性道具，可在夜晚毒死一名存活玩家。
    count: 1
- name: hunter
  display_name: 猎人
  faction: good
  brief: '你是【猎人】。被狼人刀死或被投票放逐时（被女巫毒死则不能），

    可以开枪带走一名玩家。目标：用枪反制狼人。发言简洁，80字内。

    '
  scopes:
  - public
  - town
  abilities:
  - vote
  - shoot
- name: guard
  display_name: 守卫
  faction: good
  brief: '你是【守卫】。每晚可以守护一名玩家，使其免于狼人袭击；

    不能连续两晚守护同一名玩家。守护和女巫解药同时作用于同一人时会冲突。

    发言简洁，80字内。

    '
  scopes:
  - public
  - town
  - whisper:guard
  abilities:
  - vote
  - protect
- name: villager
  display_name: 村民
  faction: good
  brief: '你是【村民】，没有特殊能力。目标：通过讨论与投票找出狼人淘汰他们。

    发言简洁，控制在 80 字内。

    '
  scopes:
  - public
  - town
  abilities:
  - vote
players:
  count: '{{total_players}}'
  initial_attrs:
    alive: true
    vote_weight: 1
  casting:
    type: shuffle
    distribution:
      werewolf: '{{werewolf_count}}'
      villager: 4
      seer: 1
      witch: 1
      hunter: 1
      guard: 1
scopes:
- name: public
  display_name: 全场
  members: all
  delivery: immediate
- name: town
  display_name: 城镇（存活）
  members:
    filter:
      left: alive
      op: equal
      right: true
  delivery: immediate
- name: wolf-den
  display_name: 狼人密室
  members:
    filter:
      all:
      - left: alive
        op: equal
        right: true
      - left: role
        op: equal
        right: werewolf
  delivery: immediate
- name: whisper:seer
  display_name: 预言家私语
  members:
    filter:
      all:
      - left: alive
        op: equal
        right: true
      - left: role
        op: equal
        right: seer
  delivery: immediate
- name: whisper:witch
  display_name: 女巫私语
  members:
    filter:
      all:
      - left: alive
        op: equal
        right: true
      - left: role
        op: equal
        right: witch
  delivery: immediate
- name: whisper:guard
  display_name: 守卫私语
  members:
    filter:
      all:
      - left: alive
        op: equal
        right: true
      - left: role
        op: equal
        right: guard
  delivery: immediate
initial_state:
  GAME:
    round: 0
    wolf_target: null
    saved: false
    witch_heal_available: true
    witch_poison_available: true
    poison_target: null
    night_deaths: []
    guarded_target: null
    last_guarded_target: null
    last_vote_target: null
    sheriff: null
    has_sheriff: false
    sheriff_candidates: []
    sheriff_pk_candidates: []
    need_sheriff_pk: false
    day_speech_order: []
    day_pk_candidates: []
    need_day_pk: false
flow:
  loop: true
  scenes:
  - name: night-fall
    display_name: 夜幕降临
    scene_type: narration
    scope: town
    participants:
      filter:
        left: alive
        op: equal
        right: true
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 天黑了，请所有人闭上眼睛。
    resolution:
      effects:
      - type: increment_state
        entity: GAME
        attr: round
        value: 1
      - type: set_state
        entity: GAME
        attr: saved
        value: false
      - type: set_state
        entity: GAME
        attr: poison_target
        value: null
      - type: set_state
        entity: GAME
        attr: wolf_target
        value: null
      - type: set_state
        entity: GAME
        attr: guarded_target
        value: null
      - type: set_state
        entity: GAME
        attr: last_vote_target
        value: null
      - type: clear
        path: GAME.day_pk_candidates
      - type: clear
        path: GAME.day_speech_order
      - type: set_state
        entity: GAME
        attr: need_day_pk
        value: false
  - name: guard-protect
    display_name: 守卫守护
    scene_type: choose
    scope: whisper:guard
    participants:
      filter:
        all:
        - left: alive
          op: equal
          right: true
        - left: role
          op: equal
          right: guard
    dialogue_policy:
      mode: single
    action_policy:
      kind: choose_one
      target: required
    candidates:
      filter:
        left: alive
        op: equal
        right: true
      when:
        op: not_equal
        left: candidate
        right: GAME.last_guarded_target
    response:
      mode: structured
      schema: target
      prompt: 你的身份档案中写明了你的玩家名。理由必须和 target 一致；如果理由写“守自己”，target 必须是你的玩家名。
      cue: 守卫，请选择今晚要守护的玩家。不能连续两晚守护同一名玩家。
    resolution:
      effects:
      - type: set_state
        entity: GAME
        attr: guarded_target
        value: data.target
      - type: set_state
        entity: GAME
        attr: last_guarded_target
        value: data.target
  - name: seer-check
    display_name: 预言家查验
    scene_type: choose
    scope: whisper:seer
    participants:
      filter:
        all:
        - left: alive
          op: equal
          right: true
        - left: role
          op: equal
          right: seer
    dialogue_policy:
      mode: single
    action_policy:
      kind: choose_one
      target: required
    candidates:
      filter:
        left: alive
        op: equal
        right: true
      when:
        op: not_equal
        left: candidate
        right: actor
    response:
      mode: structured
      schema: target
      cue: 预言家，请选择一名玩家查验其真实身份。
    resolution:
      effects:
      - type: record_target
        attr: seer_target
        source: data.target
      - type: broadcast
        scope: whisper:seer
        template: 查验结果：{data.target} 的阵营是 {data.target.faction}。
  - name: wolf-discuss
    display_name: 狼人商量
    scene_type: speak
    scope: wolf-den
    participants:
      filter:
        all:
        - left: alive
          op: equal
          right: true
        - left: role
          op: equal
          right: werewolf
    dialogue_policy:
      mode: sequential
    response:
      mode: text
      cue:
        text: 狼人们，睁开眼睛，小声商量今晚刀谁。当前存活好人：{alive_good_players}
        vars:
          alive_good_players:
            entities:
              filter:
                all:
                - left: alive
                  op: equal
                  right: true
                - left: faction
                  op: equal
                  right: good
            format: names
  - name: wolf-vote
    display_name: 狼人投票
    scene_type: vote
    scope: wolf-den
    participants:
      filter:
        all:
        - left: alive
          op: equal
          right: true
        - left: role
          op: equal
          right: werewolf
    dialogue_policy:
      mode: simultaneous
    action_policy:
      kind: vote
      target: required
    candidates:
      filter:
        left: alive
        op: equal
        right: true
      extra:
      - '@NO_KILL'
    response:
      mode: structured
      schema: vote
      cue: 请每位狼人秘密投票，选出今晚的袭击目标。允许自刀，也可以选择 NO_KILL 空刀。
    resolution:
      effects:
      - type: record_target
        attr: wolf_target
        source: winner
        when:
          op: not_equal
          left: winner
          right: NO_KILL
  - name: witch-save
    display_name: 女巫救人
    scene_type: action
    scope: whisper:witch
    participants:
      filter:
        all:
        - left: alive
          op: equal
          right: true
        - left: role
          op: equal
          right: witch
      when:
        all:
        - item_available:
            entity: actor
            item: heal_potion
        - op: not_null
          left: GAME.wolf_target
          right: true
        - op: not_equal
          left: GAME.wolf_target
          right: actor
    dialogue_policy:
      mode: single
    action_policy:
      kind: yes_no
      target: none
    response:
      mode: structured
      schema: action
      include_reason: true
      cue: 女巫，今晚 {GAME.wolf_target} 被狼人袭击。你是否使用解药救他？（是=救，否=不救）
    resolution:
      effects:
      - type: set_state
        entity: GAME
        attr: saved
        value: true
        when:
          op: equal
          left: data.action
          right: true
      - type: consume_item
        entity: actor
        item: heal_potion
        when:
          op: equal
          left: data.action
          right: true
  - name: witch-poison
    display_name: 女巫毒人
    scene_type: action
    scope: whisper:witch
    participants:
      filter:
        all:
        - left: alive
          op: equal
          right: true
        - left: role
          op: equal
          right: witch
      when:
        all:
        - item_available:
            entity: actor
            item: poison_potion
        - op: equal
          left: GAME.saved
          right: false
    dialogue_policy:
      mode: single
    action_policy:
      kind: yes_no
      target: optional
    candidates:
      filter:
        left: alive
        op: equal
        right: true
    response:
      mode: structured
      schema: action
      include_reason: true
      cue: 女巫，你是否使用毒药毒死某人？注意：本晚如果已经使用解药，则不能再使用毒药。（是=毒人并选目标，否=不毒）【本晚权威状态】当前是第 {GAME.round} 夜；本幕只会在本晚尚未使用解药时触发，因此当前状态=本晚未使用解药。你可能记得之前某晚使用过解药，那是历史信息，不代表本晚已经用过解药。
    resolution:
      effects:
      - type: set_state
        entity: GAME
        attr: poison_target
        value: data.target
        when:
          all:
          - op: equal
            left: data.action
            right: true
          - op: not_null
            left: data.target
            right: true
      - type: consume_item
        entity: actor
        item: poison_potion
        when:
          all:
          - op: equal
            left: data.action
            right: true
          - op: not_null
            left: data.target
            right: true
  - name: dawn-resolve
    display_name: 黎明结算
    scene_type: narration
    scope: town
    dialogue_policy:
      mode: none
    response:
      mode: none
    participants:
      filter:
        left: alive
        op: equal
        right: true
    resolution:
      effects:
      - type: kill
        target:
          ref: GAME.wolf_target
        cause: wolf
        when:
          all:
          - op: not_null
            left: GAME.wolf_target
            right: true
          - any:
            - all:
              - op: equal
                left: GAME.saved
                right: false
              - op: not_equal
                left: GAME.guarded_target
                right: GAME.wolf_target
            - all:
              - op: equal
                left: GAME.saved
                right: true
              - op: equal
                left: GAME.guarded_target
                right: GAME.wolf_target
      - type: kill
        target:
          ref: GAME.poison_target
        cause: poison
        when:
          op: not_null
          left: GAME.poison_target
          right: true
  - name: sheriff-election-reset
    display_name: 警长竞选开始
    scene_type: narration
    scope: town
    participants:
      filter:
        left: alive
        op: equal
        right: true
    when:
      value:
        ref: GAME.round
      less_than_equal: 1
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 首个白天开始，现在进入警长竞选。想竞选警长的玩家可以上警。
    resolution:
      effects:
      - type: clear
        path: GAME.sheriff_candidates
      - type: clear
        path: GAME.sheriff_pk_candidates
      - type: set_state
        entity: GAME
        attr: need_sheriff_pk
        value: false
      - type: set_state
        entity: GAME
        attr: sheriff
        value: null
      - type: set_state
        entity: GAME
        attr: has_sheriff
        value: false
  - name: sheriff-join
    display_name: 上警
    scene_type: action
    scope: town
    participants:
      filter:
        left: alive
        op: equal
        right: true
    when:
      value:
        ref: GAME.round
      less_than_equal: 1
    dialogue_policy:
      mode: simultaneous
    action_policy:
      kind: yes_no
      target: none
    response:
      mode: structured
      schema: action
      include_reason: false
      cue: 是否上警竞选警长？（是=上警，否=留在警下投票）
    resolution:
      effects:
      - type: for_each
        items: responses
        as: item
        effects:
        - type: add
          path: GAME.sheriff_candidates
          value: item.actor
          when:
            op: equal
            left: item.data.action
            right: true
  - name: sheriff-speech
    display_name: 警上发言
    scene_type: speak
    scope: town
    participants:
      from_state: GAME.sheriff_candidates
    when:
      all:
      - value:
          ref: GAME.round
        less_than_equal: 1
      - evaluator: code
        runtime: python
        code: result = bool(len(attr('GAME', 'sheriff_candidates', [])) > 0)
    dialogue_policy:
      mode: sequential
    response:
      mode: text
      cue: 你在警上竞选警长，请发表竞选发言。
  - name: sheriff-withdraw
    display_name: 警上退水
    scene_type: action
    scope: town
    participants:
      from_state: GAME.sheriff_candidates
    when:
      all:
      - value:
          ref: GAME.round
        less_than_equal: 1
      - evaluator: code
        runtime: python
        code: result = bool(len(attr('GAME', 'sheriff_candidates', [])) > 0)
    dialogue_policy:
      mode: simultaneous
    action_policy:
      kind: yes_no
      target: none
    response:
      mode: structured
      schema: action
      include_reason: true
      cue: 警上玩家是否退水？（是=退水，否=继续竞选）
    resolution:
      effects:
      - type: for_each
        items: responses
