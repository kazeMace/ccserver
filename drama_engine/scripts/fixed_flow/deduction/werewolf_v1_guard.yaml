referee:
  conditions:
  - winner: good
    display_name: 好人胜利
    message: 所有狼人已被淘汰！好人阵营获胜！
    when:
      left:
        count:
          filter:
            all:
            - left: alive
              op: equal
              right: true
            - left: faction
              op: equal
              right: wolf
      op: equal
      right: 0
  - winner: wolf
    display_name: 狼人胜利
    message: 狼人刀边成功：平民或神职已经全部出局，狼人阵营获胜！
    when:
      any:
      - left:
          count:
            filter:
              all:
              - left: alive
                op: equal
                right: true
              - left: role
                op: equal
                right: villager
        op: equal
        right: 0
      - evaluator: code
        runtime: python
        code: "god_roles = {\"seer\", \"witch\", \"hunter\", \"guard\"}\nalive_gods = 0\nfor name in entities({\"alive\": True}):\n    if attr(name, \"role\") in god_roles:\n        alive_gods += 1\nresult = alive_gods == 0\n"
  check_on:
  - after_scene
