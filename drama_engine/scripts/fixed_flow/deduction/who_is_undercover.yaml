meta:
  title: 谁是卧底 6 人局
  description: 5 名平民与 1 名卧底围绕相近词发言、投票、猜词的固定流程样例。
  min_players: 6
  max_players: 6
runtime:
  type: game_session
game_pack:
  plugin: builtin.party.free_discussion
  config:
    topic: word_deduction
concepts:
  roles:
    civilian:
      display_name: 平民
      description: 拿到普通词，需要通过描述和投票找出卧底。
    undercover:
      display_name: 卧底
      description: 拿到相近但不同的词，需要隐藏差异并存活到最后。
  factions:
    civilian_team:
      display_name: 平民阵营
      description: 找出并投出卧底。
    undercover_team:
      display_name: 卧底阵营
      description: 误导平民并避免被投出。
  scopes:
    public:
      display_name: 公开桌面
      description: 全员可见的发言、讨论和投票区域。
    word-secret:
      display_name: 私密词语
      description: 玩家只看见自己的词语提示。
  abilities:
    describe:
      display_name: 描述词语
      description: 用一句话描述自己的词，但不能直接说出词语。
      prompt: 描述要模糊但有信息量，避免直接暴露原词。
    vote:
      display_name: 投票
      description: 投票指出最像卧底的玩家。
      prompt: 根据每轮描述和讨论选择嫌疑人，并给出理由。
    guess:
      display_name: 猜词
      description: 卧底被投出时尝试猜平民词。
      prompt: 如果你是卧底，请根据其他人的描述猜出平民词。
roles:
- name: civilian
  display_name: 平民
  faction: civilian_team
  brief: 你的词是平民词。描述时不能直接说词语，要找出拿到不同词的卧底。
  scopes:
  - public
  - word-secret
  abilities:
  - describe
  - vote
- name: undercover
  display_name: 卧底
  faction: undercover_team
  brief: 你的词和多数人不同。你要伪装成平民，避免被投出。
  scopes:
  - public
  - word-secret
  abilities:
  - describe
  - vote
  - guess
players:
  count: 6
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      civilian: 5
      undercover: 1
scopes:
- name: public
  members: all
- name: word-secret
  members: all
flow:
  loop: false
  scenes:
  - name: word-assignment
    display_name: 分发词语
    scene_type: narration
    scope: word-secret
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统向每名玩家私密发放词语：平民词为“咖啡”，卧底词为“奶茶”。
  - name: first-description
    display_name: 第一轮描述
    scene_type: speak
    scope: public
    participants:
      filter:
        left: alive
        op: equal
        right: true
      ordered: true
    dialogue_policy:
      mode: sequential
    response:
      mode: text
      cue: 每名玩家用一句话描述自己的词，不能直接说出词语或同义词。
  - name: table-discussion
    display_name: 公开讨论
    scene_type: speak
    scope: public
    participants:
      filter:
        left: alive
        op: equal
        right: true
    dialogue_policy:
      mode: openchat
      rounds: 2
      speakers_per_round: 3
    response:
      mode: text
      cue: 围绕刚才的描述自由讨论，指出可疑点。
  - name: vote-undercover
    display_name: 投票指出卧底
    scene_type: vote
    scope: public
    participants:
      filter:
        left: alive
        op: equal
        right: true
    candidates:
      filter:
        left: alive
        op: equal
        right: true
      when:
        op: not_equal
        left: candidate
        right: actor
    action_policy:
      kind: vote
      target: required
      input:
        widget: player_select
    response:
      mode: structured
      schema: vote
      include_reason: true
      cue: 投票给你认为最像卧底的玩家。
    resolution:
      selection:
        type: plurality
        tie_policy: no_winner
      effects:
      - type: kill
        target: winner
        cause: voted_out
      - type: record_target
        attr: voted_out_player
        source: winner
  - name: undercover-final-guess
    display_name: 卧底猜词
    scene_type: action
    scope: public
    participants:
      filter:
        all:
        - left: role
          op: equal
          right: undercover
        - left: alive
          op: equal
          right: false
      min: 0
    dialogue_policy:
      mode: single
    action_policy:
      kind: form
      input:
        widget: text
    response:
      mode: structured
      schema: custom
      fields:
        guess:
          type: string
          description: 你猜测的平民词
      cue: 如果你是被投出的卧底，请猜测平民词。
referee:
  conditions:
  - faction: civilian_team
    when:
      op: equal
      left: GAME.voted_out_player.role
      right: undercover
  check_on:
  - after_scene
