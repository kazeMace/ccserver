meta:
  title: Agent DM 冒险
  description: 可直接运行的 Agent DM 冒险脚本：DM 报幕、玩家 d20 行动、rule_set 记录故事记忆与成功进度，DM 再做叙事裁定。
  min_players: 2
  max_players: 4
runtime:
  type: game_session
extensions:
  story:
    enabled: true
    version: '0.1'
    config:
      dm_policy: guided_fixed_scene
  dice:
    enabled: true
    version: '0.1'
    config:
      checks: d20
rule_set:
  plugin: builtin.story.agent_dm_adventure_lite
  config:
    objective: collaborative_adventure
    dc: 12
    successes_to_win: 3
concepts:
  roles:
    hero:
      display_name: 英雄
      description: 由人类或 Agent 扮演的冒险角色。
    dm:
      display_name: DM
      description: 叙事和裁定者，当前脚本用 narration scene 固定表达。
  factions:
    party:
      display_name: 冒险小队
      description: 协作完成 DM 给出的目标。
    narrator:
      display_name: 叙事方
      description: 负责报幕和裁定。
  scopes:
    public:
      display_name: 冒险桌
      description: 所有人可见的叙事和行动区。
  abilities:
    act:
      display_name: 冒险行动
      description: 玩家描述行动并提交检定。
      prompt: 明确行动目标、方式和期望结果。
    adjudicate:
      display_name: 裁定
      description: DM 根据行动和规则给出结果。
      prompt: 根据行动、骰点和场景风险给出清晰裁定。
roles:
- name: hero
  display_name: 英雄
  faction: party
  brief: 你要和其他玩家协作，回应 DM 场景并推进冒险。
  scopes:
  - public
  abilities:
  - act
- name: dm
  display_name: DM
  faction: narrator
  brief: 你负责描述场景、提出挑战并裁定行动结果。
  scopes:
  - public
  abilities:
  - adjudicate
players:
  count: 3
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      hero: 2
      dm: 1
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: dm-opening
    display_name: DM 开场
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: DM 描述被雾封锁的山谷、远处钟声和需要救出的商队。
    publication:
      views:
      - id: agent-dm-state
        kind: key-value
        title: Agent DM 冒险状态
        audience: public
        data:
          rows:
          - label: 成功次数
            value:
              ref: GAME.agent_dm_adventure_lite_successes
          - label: 故事记忆
            value:
              ref: GAME.story_memory
  - name: player-actions
    display_name: 玩家行动
    scene_type: action
    scope: public
    participants:
      filter:
        role: hero
    dialogue_policy:
      mode: sequential
    action_policy:
      kind: form
      input:
        widget: text
    response:
      mode: structured
      schema: custom
      fields:
        action:
          type: string
          description: 玩家行动
        roll:
          type: int
          description: d20 点数
      cue: 描述行动并提交 d20 点数。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_dm_rule_result
    publication:
      views:
      - id: agent-dm-last-check
        kind: key-value
        title: 最近行动结算
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_dm_rule_result
  - name: dm-ruling
    display_name: DM 裁定
    scene_type: speak
    scope: public
    participants:
      filter:
        role: dm
    dialogue_policy:
      mode: single
    response:
      mode: text
      cue: DM 根据玩家行动和检定结果给出裁定，并推进到下一场景。
  - name: adventure-ending
    display_name: 冒险收束
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统总结商队是否获救、山谷秘密和下一章伏笔；成功次数达到 3 时小队完成本段冒险。
referee:
  conditions: []
  check_on:
  - after_scene
