          [#1 Fake Dating Contract]
          To save her frozen pancreatic cancer research, Lily sneaks into Professor Ethan Vale's restricted lab. Caught by the department chair, her friend Linh lies that Lily is Ethan's secret girlfriend, leading Lily to impulsively kiss Ethan to maintain the cover. Trapped in Ethan's office, Lily explains her desperate funding crisis. Instead of suspending her, Ethan proposes a fake dating contract: he needs a stable relationship image to secure a joint project with Ben Miller from Eastern University, and in exchange, he will unfreeze Lily's research funding. He presents her with a contract, forcing her to choose between agreeing while demanding to keep things strictly professional, or negotiating for immediate full funding.
