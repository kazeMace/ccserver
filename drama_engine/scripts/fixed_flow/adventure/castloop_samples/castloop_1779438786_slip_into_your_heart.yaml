          [#26 Shadow Over the Stage]
          The performance begins without incident — until Haruki spots the rigging on the full moon backdrop starting to give way, directly above Mizuki. When the rope snaps, he uses his ability to redirect the falling backdrop in a smooth arc off the stage, making it look almost intentional to the audience. Sota and Nono watch in stunned silence.
          But the cost lands immediately and at scale. The friction disappears from the entire stage floor — every board, spreading even into the front rows of the audience. Mizuki's feet find nothing beneath her next step. She can't fall gracefully or correct herself; each instinctive adjustment only slides her further toward the edge of the stage. The audience still hasn't realized anything is wrong — to them, it looks like part of the act. In the wings, Haruki watches through the curtain gap as she drifts toward the drop, his hand tightening around the curtain.
