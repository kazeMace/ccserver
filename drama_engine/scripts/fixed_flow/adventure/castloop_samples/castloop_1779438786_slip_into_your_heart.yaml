        cue: |-
          [#1 Curtain, Skin, Zero Friction]
          The school festival is setting up around him, and Haruki wants no part of it. When a bucket of red paint flies toward Mizuki, he reverses it without thinking — and pays the price: friction vanishes beneath her feet, she pitches sideways, and she's falling straight at him. The morning has barely started.
