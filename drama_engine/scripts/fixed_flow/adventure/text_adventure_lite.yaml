meta:
  title: 文字冒险
  description: 可直接运行的单人文字冒险脚本：观察、行动、记录 adventure_log，并在使用钥匙/开锁/逃脱关键词时写入胜利。
  min_players: 1
  max_players: 1
runtime:
  type: game_session
extensions:
  story:
    enabled: true
    version: '0.1'
    config:
      mode: solo_text_adventure
rule_set:
  plugin: builtin.story.text_adventure_lite
  config:
    objective: escape_room
concepts:
  roles:
    protagonist:
      display_name: 主角
      description: 单人文字冒险的行动者。
  factions:
    hero:
      display_name: 主角
      description: 逃离房间并揭开谜题。
  scopes:
    public:
      display_name: 冒险文本
      description: 玩家可见的场景与反馈。
  abilities:
    inspect:
      display_name: 观察
      description: 观察环境、物品和线索。
      prompt: 明确你要查看的对象。
    act:
      display_name: 行动
      description: 输入一个具体行动。
      prompt: 行动要具体，说明使用物品或目标。
roles:
- name: protagonist
  display_name: 主角
  faction: hero
  brief: 你在陌生房间醒来，需要通过观察和行动逃出去。
  scopes:
  - public
  abilities:
  - inspect
  - act
players:
  count: 1
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      protagonist: 1
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: room-description
    display_name: 房间描述
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 你醒在一间锁住的旧书房，桌上有油灯、信件和一把生锈钥匙。
    publication:
      views:
      - id: text-adventure-state
        kind: key-value
        title: 文字冒险状态
        audience: public
        data:
          rows:
          - label: 冒险日志
            value:
              ref: GAME.adventure_log
          - label: 胜利玩家
            value:
              ref: GAME.winner
  - name: inspect-object
    display_name: 观察对象
    scene_type: action
    scope: public
    participants: all
    action_policy:
      kind: form
      input:
        widget: text
    response:
      mode: structured
      schema: custom
      fields:
        target:
          type: string
          description: 观察对象
      cue: 选择一个对象进行观察。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_inspection
    publication:
      views:
      - id: text-last-inspection
        kind: key-value
        title: 最近观察
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_inspection
  - name: choose-action
    display_name: 输入行动
    scene_type: action
    scope: public
    participants: all
    action_policy:
      kind: form
      input:
        widget: text
    response:
      mode: structured
      schema: custom
      fields:
        action:
          type: string
          description: 具体行动
      cue: 输入你要采取的行动。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_action_result
    publication:
      views:
      - id: text-last-action
        kind: key-value
        title: 最近行动
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_action_result
  - name: ending
    display_name: 固定结局
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统根据 adventure_log 给出逃脱、失败或隐藏结局；如果 GAME.winner 不为空，说明玩家已经逃脱。
referee:
  conditions: []
  check_on:
  - after_scene
