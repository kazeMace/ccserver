meta:
  title: 骰子地图冒险
  description: 可直接运行的骰子地图冒险脚本：探险者顺序掷骰移动、消耗补给、触发事件，到达宝藏节点后队伍获胜。
  min_players: 3
  max_players: 4
runtime:
  type: game_session
extensions:
  board:
    enabled: true
    version: '0.1'
    config:
      boards:
        map:
          type: node_map
          nodes: 12
  dice:
    enabled: true
    version: '0.1'
    config:
      dice:
        travel: d6
  story:
    enabled: true
    version: '0.1'
    config:
      setting: island_expedition
rule_set:
  plugin: builtin.story.dice_map_adventure_lite
  config:
    objective: reach_treasure
    treasure_node: 11
concepts:
  roles:
    explorer:
      display_name: 探险者
      description: 掷骰移动并处理地图事件。
  factions:
    party:
      display_name: 探险队
      description: 协作到达宝藏节点。
  scopes:
    public:
      display_name: 地图桌
      description: 全员可见的地图、事件和路线。
  abilities:
    travel:
      display_name: 探索移动
      description: 根据骰点选择地图移动路径。
      prompt: 在风险和收益之间选择路线。
    resolve_event:
      display_name: 处理事件
      description: 选择如何处理地图事件。
      prompt: 根据角色状态和目标选择事件处理方式。
roles:
- name: explorer
  display_name: 探险者
  faction: party
  brief: 你要和队友协作探索岛屿地图，找到宝藏并安全返回。
  scopes:
  - public
  abilities:
  - travel
  - resolve_event
players:
  count: 4
  initial_attrs:
    alive: true
    supplies: 3
    node: 0
  casting:
    type: shuffle
    distribution:
      explorer: 4
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: map-intro
    display_name: 岛屿地图公开
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统公开 12 节点岛屿地图，宝藏位于节点 11。每次移动消耗 1 点 supplies；到达宝藏节点后 GAME.winner=party。
    publication:
      views:
      - id: map-status
        kind: key-value
        title: 地图冒险状态
        audience: public
        data:
          rows:
          - label: 胜利方
            value:
              ref: GAME.winner
          - label: 胜利条件
            value:
              ref: GAME.winning_condition
  - name: travel-roll
    display_name: 掷骰探索
    scene_type: board
    scope: public
    participants:
      filter:
        left: alive
        op: equal
        right: true
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      include_reason: true
      cue: 提交骰点、当前位置和目标节点，例如 roll=3, from=4, to=7；如果不填 to，系统按当前 node + roll 推进。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_map_adventure_result
    publication:
      views:
      - id: map-last-result
        kind: key-value
        title: 最近探索结算
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_map_adventure_result
  - name: event-choice
    display_name: 地图事件选择
    scene_type: action
    scope: public
    participants: all
    dialogue_policy:
      mode: openchat
      rounds: 1
      speakers_per_round: 4
    action_policy:
      kind: form
      input:
        widget: choice
    response:
      mode: structured
      schema: custom
      fields:
        option:
          type: string
          description: 选择的事件应对方案
      cue: 讨论并提交事件应对方案。事件可影响 supplies、路线选择或下一轮风险；当前版本由主持人按讨论结果写入状态。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_event_result
referee:
  conditions: []
  check_on:
  - after_scene
