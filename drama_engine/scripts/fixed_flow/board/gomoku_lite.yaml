meta:
  title: 五子棋
  description: 可直接运行的 15x15 五子棋脚本：黑白交替落子，rule_set 负责越界/占位校验、写入棋盘，并在横竖斜任一方向五连时写入赢家。
  min_players: 2
  max_players: 2
runtime:
  type: game_session
extensions:
  board:
    enabled: true
    version: '0.1'
    config:
      boards:
        main:
          type: grid
          rows: 15
          cols: 15
          coordinate_system: grid_2d
rule_set:
  plugin: builtin.board.gomoku_lite
  config:
    objective: five_in_row
    board_size: 15
concepts:
  roles:
    black:
      display_name: 黑棋
      description: 先手落黑子。
    white:
      display_name: 白棋
      description: 后手落白子。
  factions:
    black_side:
      display_name: 黑方
      description: 连成五子获胜。
    white_side:
      display_name: 白方
      description: 连成五子获胜。
  scopes:
    public:
      display_name: 棋盘
      description: 双方可见的公开棋盘。
  abilities:
    place_piece:
      display_name: 落子
      description: 在空交叉点落下一枚己方棋子。
      prompt: 选择一个空位坐标落子，优先阻挡或形成连线。
roles:
- name: black
  display_name: 黑棋
  faction: black_side
  brief: 你执黑先手，目标是在横竖斜任一方向连成五子。
  scopes:
  - public
  abilities:
  - place_piece
- name: white
  display_name: 白棋
  faction: white_side
  brief: 你执白后手，目标是在横竖斜任一方向连成五子。
  scopes:
  - public
  abilities:
  - place_piece
players:
  count: 2
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      black: 1
      white: 1
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: board-open
    display_name: 棋盘准备
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统建立 15x15 棋盘，坐标范围为 0-14。黑棋先手，双方只能在空位落子；任意方向连续 5 枚同色棋子即胜利。
    publication:
      views:
      - id: gomoku-board
        kind: board
        title: 五子棋棋盘
        audience: public
        data:
          board:
            ref: GAME.gomoku_board
      - id: gomoku-status
        kind: key-value
        title: 五子棋状态
        audience: public
        data:
          rows:
          - label: 胜利玩家
            value:
              ref: GAME.winner
          - label: 胜利条件
            value:
              ref: GAME.winning_condition
  - name: black-move
    display_name: 黑棋落子
    scene_type: board
    scope: public
    participants:
      filter:
        role: black
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      cue: 黑棋请选择落子坐标，例如 position=[7, 7]。不能越界，不能落在已有棋子上；系统会自动检查五连。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_board_rule_result
    publication:
      views:
      - id: gomoku-last-move
        kind: key-value
        title: 最近落子
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_board_rule_result
  - name: white-move
    display_name: 白棋落子
    scene_type: board
    scope: public
    participants:
      filter:
        role: white
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      cue: 白棋请选择落子坐标，例如 position=[7, 8]。不能越界，不能落在已有棋子上；系统会自动检查五连。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_board_rule_result
    publication:
      views:
      - id: gomoku-last-move
        kind: key-value
        title: 最近落子
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_board_rule_result
referee:
  conditions: []
  check_on:
  - after_scene
