meta:
  title: 跳棋
  description: 可直接运行的 8x8 跳棋脚本：双方交替斜走或跳吃，rule_set 移除被跳吃棋子，并在到底线时升王。
  min_players: 2
  max_players: 2
runtime:
  type: game_session
extensions:
  board:
    enabled: true
    version: '0.1'
    config:
      boards:
        main:
          type: grid
          rows: 8
          cols: 8
          coordinate_system: grid_2d
rule_set:
  plugin: builtin.board.checkers_lite
  config:
    objective: capture_all
concepts:
  roles:
    dark:
      display_name: 深色方
      description: 操作深色棋子。
    light:
      display_name: 浅色方
      description: 操作浅色棋子。
  factions:
    dark_side:
      display_name: 深色方
      description: 深色棋子阵营。
    light_side:
      display_name: 浅色方
      description: 浅色棋子阵营。
  scopes:
    public:
      display_name: 棋盘
      description: 公开跳棋棋盘。
  abilities:
    move_piece:
      display_name: 移动或跳吃
      description: 移动一枚棋子，能跳吃时优先跳吃。
      prompt: 提交 from/to 坐标，并说明是否跳吃。
roles:
- name: dark
  display_name: 深色方
  faction: dark_side
  brief: 你操作深色棋子，目标吃掉或封锁对方所有棋子。
  scopes:
  - public
  abilities:
  - move_piece
- name: light
  display_name: 浅色方
  faction: light_side
  brief: 你操作浅色棋子，目标吃掉或封锁对方所有棋子。
  scopes:
  - public
  abilities:
  - move_piece
players:
  count: 2
  initial_attrs:
    alive: true
  casting:
    type: shuffle
    distribution:
      dark: 1
      light: 1
scopes:
- name: public
  members: all
flow:
  loop: true
  scenes:
  - name: checkers-setup
    display_name: 摆放跳棋
    scene_type: narration
    scope: public
    participants: all
    dialogue_policy:
      mode: none
    response:
      mode: none
      cue: 系统在 8x8 棋盘上摆放双方跳棋。手动运行时可把棋盘写入 GAME.checkers_board，key 为 row,col，value 为 D/L/DK/LK。
    publication:
      views:
      - id: checkers-board
        kind: board
        title: 跳棋棋盘
        audience: public
        data:
          board:
            ref: GAME.checkers_board
          size: 8
      - id: checkers-status
        kind: key-value
        title: 跳棋状态
        audience: public
        data:
          rows:
          - label: 最近吃子
            value:
              ref: GAME.last_captured
  - name: dark-action
    display_name: 深色方行动
    scene_type: board
    scope: public
    participants:
      filter:
        role: dark
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      cue: 深色方提交移动或跳吃，例如 from=[5,0], to=[4,1] 斜走一格，或 from=[5,0], to=[3,2] 跳吃中间棋子。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_checkers_rule_result
    publication:
      views:
      - id: checkers-last-result
        kind: key-value
        title: 最近行动
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_checkers_rule_result
  - name: light-action
    display_name: 浅色方行动
    scene_type: board
    scope: public
    participants:
      filter:
        role: light
    action_policy:
      kind: board_move
      input:
        widget: board_move
    response:
      mode: structured
      schema: move
      cue: 浅色方提交移动或跳吃，例如 from=[2,1], to=[3,0] 斜走一格，或 from=[2,1], to=[4,3] 跳吃中间棋子。
    resolution:
      effects:
      - type: rule_set_apply
        result_path: GAME.last_checkers_rule_result
    publication:
      views:
      - id: checkers-last-result
        kind: key-value
        title: 最近行动
        audience: public
        data:
          rows:
          - label: 结算
            value:
              ref: GAME.last_checkers_rule_result
referee:
  conditions: []
  check_on:
  - after_scene
