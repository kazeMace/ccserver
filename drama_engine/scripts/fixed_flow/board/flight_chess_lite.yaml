meta:
  title: 飞行棋
  description: 可直接运行的 4 人飞行棋脚本：玩家顺序掷骰，6 点起飞，沿 52 格航线移动，落到对手飞机位置时撞回基地，率先让 4 架飞机到家者获胜。
  min_players: 4
  max_players: 4
runtime:
  type: game_session
extensions:
  board:
    enabled: true
    version: "0.1"
    config:
      boards:
        track:
          type: loop_track
          tiles: 52
  dice:
    enabled: true
    version: "0.1"
    config:
      dice:
        movement: d6
rule_set:
  plugin: builtin.board.flight_chess_lite
  config:
    objective: reach_home
    track_size: 52
    planes_to_win: 4
concepts:
  roles:
    pilot:
      display_name: 飞行员
      description: 掷骰移动飞机，争取全部到达终点。
  factions:
    solo:
      display_name: 个人胜利
      description: 每名玩家独立竞争。
  scopes:
    public:
      display_name: 飞行棋盘
      description: 全员可见的路线、飞机和骰点。
  abilities:
    roll:
      display_name: 掷骰
      description: 掷骰决定飞机能否起飞或移动。
      prompt: 根据骰点选择最优飞机行动。
    move_plane:
      display_name: 移动飞机
      description: 选择一架飞机起飞、前进或进入终点。
      prompt: 优先考虑撞机、避险和进终点。
roles:
  - name: pilot
    display_name: 飞行员
    faction: solo
    brief: 你要通过掷骰移动飞机，率先让全部飞机到达终点。
    scopes: [public]
    abilities: [roll, move_plane]
players:
  count: 4
  initial_attrs:
    alive: true
    planes_home: 0
    planes:
      A: base
      B: base
      C: base
      D: base
  casting:
    type: shuffle
    distribution:
      pilot: 4
scopes:
  - name: public
    members: all
flow:
  loop: true
  scenes:
    - name: flight-setup
      display_name: 飞机入库
      scene_type: narration
      scope: public
      participants: all
      dialogue_policy:
        mode: none
      response:
        mode: none
        cue: 系统初始化 52 格航线和每名玩家 4 架飞机。飞机在 base 时必须掷出 6 才能起飞；到达或超过终点记为 home。
      publication:
        views:
          - id: flight-status
            kind: key-value
            title: 飞行棋状态
            audience: public
            data:
              rows:
                - label: 胜利玩家
                  value:
                    ref: GAME.winner
                - label: 胜利条件
                  value:
                    ref: GAME.winning_condition
    - name: roll-and-fly
      display_name: 掷骰移动飞机
      scene_type: board
      scope: public
      participants:
        filter:
          alive: true
      action_policy:
        kind: board_move
        input:
          widget: board_move
      response:
        mode: structured
        schema: move
        include_reason: true
        cue: |
          提交骰点和飞机移动方案，例如 plane=A, roll=6 或 plane=B, roll=4。
          如果飞机在 base，只有 roll=6 可以起飞；如果移动后落到对手飞机位置，对手飞机会回到 base；position 超过终点时该飞机记为 home。
      resolution:
        effects:
          - type: rule_set_apply
            result_path: GAME.last_flight_rule_result
      publication:
        views:
          - id: flight-last-result
            kind: key-value
            title: 最近飞行结算
            audience: public
            data:
              rows:
                - label: 结算
                  value:
                    ref: GAME.last_flight_rule_result
    - name: flight-summary
      display_name: 飞行摘要
      scene_type: narration
      scope: public
      participants: all
      dialogue_policy:
        mode: none
      response:
        mode: none
        cue: 系统公布各玩家飞机位置、撞机结果、到家数量和下一名玩家。若某名玩家 planes_home 达到 4，该玩家获胜。
referee:
  win_conditions: []
