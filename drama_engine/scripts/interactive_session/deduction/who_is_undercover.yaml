meta:
  title: 谁是卧底（6 人局）
  description: 用 interactive_session + builtin.social 机制实现的谁是卧底。发言→投票→出局→判胜，全部用机制与流程编排表达。

runtime:
  type: interactive_session

# 引入社交推理机制集合：tally_votes（计票）、eliminate（出局）、social.faction_cleared（阵营清空判定）。
game_pack:
  plugin: builtin.social

players:
  count: 6
  ids: [Player_1, Player_2, Player_3, Player_4, Player_5, Player_6]
  initial_attrs:
    alive: true

# 初始身份：5 平民 + 1 卧底（示例固定分配，真实可用发牌机制随机化）。
state:
  Player_1: { role: civilian }
  Player_2: { role: civilian }
  Player_3: { role: civilian }
  Player_4: { role: civilian }
  Player_5: { role: civilian }
  Player_6: { role: undercover }
  GAME:
    last_vote_target: null

flow:
  type: state_machine
  initial: discuss
  states:
    discuss:
      scenes:
        - discussion
      transitions:
        - to: vote
    vote:
      scenes:
        - day_vote
      terminal: true

scenes:
  discussion:
    type: scene
    scope:
      id: public_room
      visibility: public
    participants:
      filter:
        source: GAME.players
        where:
          left: alive
          op: equal
          right: true
    schedule:
      mode: openchat
      max_turns: 6
    participant_action:
      kind: speak
      response:
        mode: text
      cue: "请用一句话描述你拿到的词，注意隐藏或识别卧底。"
    controller_action:
      enabled: false

  day_vote:
    type: scene
    scope:
      id: public_room
      visibility: public
    participants:
      filter:
        source: GAME.players
        where:
          left: alive
          op: equal
          right: true
    schedule:
      mode: simultaneous
      timeout_ms: 30000
    participant_action:
      kind: vote
      target: required
      candidates:
        filter:
          source: GAME.players
          where:
            left: alive
            op: equal
            right: true
      response:
        mode: structured
        schema: vote
        include_reason: true
    controller_action:
      enabled: false
    resolution:
      # 计票 + 出局：全部由 social 机制结算。
      effects:
        - type: tally_votes
          field: vote
          to: GAME.last_vote_target
        - type: eliminate

referee:
  enabled: true
  check_on: after_scene
  rules:
    # 卧底被投出 → 平民胜。
    - when:
        evaluator: plugin
        name: social.faction_cleared
        input:
          faction: undercover
      result:
        end: civilians_win
