meta:
  title: UNO（简化 4 人局）
  description: 用 interactive_session + builtin.cards 机制实现的简化 UNO。轮流出牌，先清空手牌获胜。发牌/出牌/清空判定全部来自机制。

runtime:
  type: interactive_session

# 引入卡牌机制集合：draw_card（摸牌）、play_card（出牌）、cards.hand_empty（清空判定）。
game_pack:
  plugin: builtin.cards

players:
  count: 4
  ids: [Player_1, Player_2, Player_3, Player_4]
  initial_attrs:
    alive: true
    hand: []

# 初始牌堆（示例用固定牌堆，真实可用洗牌机制）。
state:
  GAME:
    deck: [R1, R2, R3, G1, G2, G3, B1, B2, B3, Y1, Y2, Y3, R4, G4, B4, Y4]
    discard: []
    winner: null

flow:
  type: state_machine
  initial: deal
  states:
    deal:
      scenes:
        - deal_cards
      transitions:
        - to: play
    play:
      scenes:
        - play_turn
      transitions:
        - to: play
          when:
            left: GAME.winner
            op: equal
            right: null

scenes:
  deal_cards:
    type: scene
    scope:
      id: table
      visibility: public
    participants:
      static: [Player_1, Player_2, Player_3, Player_4]
    schedule:
      mode: sequential
      order:
        source: participants
        strategy: seat_order
    participant_action:
      kind: none
    controller_action:
      enabled: false
    resolution:
      # 每位玩家发 3 张牌。
      effects:
        - type: draw_card
          count: 3

  play_turn:
    type: scene
    scope:
      id: table
      visibility: public
    participants:
      filter:
        source: GAME.players
        where:
          left: alive
          op: equal
          right: true
    schedule:
      mode: sequential
      order:
        source: participants
        strategy: seat_order
    participant_action:
      kind: action
      response:
        mode: structured
        schema:
          fields:
            - name: card
              type: string
              required: true
      cue: "轮到你出牌，请给出手中一张牌（card）。"
    controller_action:
      enabled: false
    resolution:
      effects:
        - type: play_card
    referee:
      enabled: true
      check_on: after_scene
      rules:
        - when:
            evaluator: plugin
            name: cards.hand_empty
            input:
              entity: Player_1
          result:
            effects:
              - type: set_state
                path: GAME.winner
                value: Player_1
            end: player_1_win
