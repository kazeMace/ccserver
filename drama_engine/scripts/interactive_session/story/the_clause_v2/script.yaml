    hooks:
      on_enter:
      - type: emit_media
        kind: video
        url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/video/dialogue/74937/upload_af35ffad-3351-430a-9772-9fac13b1101e.mp4
        title: 第一幕·初遇
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_01.srt
    context:
      synopsis: We meet Nora and Marco. Her professional identity and financial pressure are established before the offer exists. then enters the litigation room and loses the case.Marco dismantles her
        brief using her own structure.That evening his car is waiting outside her building. She gets in
      dialogue_history:
      - speaker: narrator
        text: Your phone's already in your hand. You're already walking.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Thirty feet to the litigation room door. Leila's voice in your ear.
        location: Law Firm Meeting Room
      - speaker: Leila
        text: Nora. You're finally in a room alone with Marco Diaz. The Marco Diaz.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/b49fb4d6-5a4d-47fa-9164-82c4e8ce521f.mp3
      - speaker: Leila
        text: Damn. The sexiest billionaire alive and you get him all to yourself—
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/b6fbf486-819a-4c24-ba1f-edb4d68ac4f3.mp3
      - speaker: Nora
        text: Leila. It's a business meeting.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b8066bbb-56b6-4aab-8b6d-6ca7345466c8.mp3
      - speaker: Leila
        text: —I swear I would peel that man like a peach—
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/7a89660b-b187-4d48-a086-2ff0c874eb76.mp3
      - speaker: Nora
        text: Goodbye, Leila.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3ac2bfd9-8108-453e-bfa9-4359a6679469.mp3
      - speaker: narrator
        text: You end the call. Phone into pocket. Both hands smooth the jacket.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Hand on the door. You push it open.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He's at your end of the table. Your brief open in front of him. He doesn't look up.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You cross to your position without breaking stride. Your documents go down beside your brief.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your hand stays on them. His are motionless. Neither of you moves.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: Mr. Diaz. My client's case is solid. This is what they would need to settle.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b5d7e58c-2a4b-4e1b-baab-d4cce5844f71.mp3
      - speaker: narrator
        text: You push a file toward him. He doesn't touch it. Slides a document back. Still doesn't look up.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: Nora.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3395ff10-f852-4bde-953d-6da51768aba5.mp3
      - speaker: Marco
        text: I acquired your client last night.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bbdcdc41-f70e-4506-bd79-293113822993.mp3
      - speaker: narrator
        text: You read the document.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: There's no case.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/0cab5d7f-2d53-4226-b99e-0e2248163899.mp3
      - speaker: narrator
        text: He closes your brief. Slides it back. Stands. Picks up his copy.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: Your argument was solid though.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/06e5f218-09f4-4fba-8544-c24c79ef562f.mp3
      - speaker: narrator
        text: He walks out without looking back.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You're alone in the room.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You close your eyes. One breath out. Open them.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You pick up your things. Walk out.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Evening. You walk out of Harwick & Crane. Your phone buzzes.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Mercy General. Your mother's bill. They may stop her medication if you don't call back.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You turn onto your street.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: I will find a solution. I won't ask anyone for anything. That's the rule.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/8a64df7f-6f79-428d-8e93-0eccf1bfeba1.mp3
      - speaker: narrator
        text: He's already there.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Leaning on a car outside your building. He was waiting. He knew your route.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You clock him. Keep walking.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He doesn't move. He doesn't need to.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: Nora.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ef903eaf-a3d5-4372-9798-8bf1c7e3507a.mp3
      - speaker: narrator
        text: You stop. Voicemail ends. Silence.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He's behind you. The street between you. Neither of you moves.
        location: Law Firm Meeting Room
      locations:
      - name: Law Firm Meeting Room
  s_05_offer_a:
    type: scene
    scope:
      id: story
      visibility: public
    participants:
      static:
      - Player_1
    schedule:
      mode: none
    participant_action:
      kind: none
      response:
        mode: none
    controller_action:
      enabled: true
      controller:
        type: human
        auto_advance: true
      kind: cinematic
      choices:
      - id: next_day_at_the_office
        text: Next day at the office
        to: node_03_clause
      free_input:
        enabled: true
        guards:
          input:
            - name: character_existence
            - name: content_safety
          output:
            - name: output_character_existence
            - name: schema_conformance
        mapper:
          enabled: true
          executor: llm
          fallback: generate
        generation:
          narration_style: dialogue_sequence
          interaction_mode: branch_choice
          choices_count: [3, 3]
          constraint:
            type: free
          presentation: cinematic
    context:
      synopsis: 'Nora is already in the car when the offer lands.

        Marco states the terms: thirty days, publicly visible, enough to clear her mother''s bills.

        She asks why her specifically and absorbs the answer.

        She says she''ll think about it and gets out without looking back.

        He stays in the car until she''s gone.'
      dialogue_history:
      - speaker: narrator
        text: He opens the car door. You look at him.
        location: Marco's Car
      - speaker: Nora
        text: Very well.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9e96c96b-b362-4364-a860-c12606fb9788.mp3
      - speaker: narrator
        text: You get in. He closes the door. Walks around. Gets in. The car moves.
        location: Marco's Car
      - speaker: narrator
        text: Dark charcoal leather. City light beginning to move through the windows.
        location: Marco's Car
      - speaker: narrator
        text: Neither of you speaks.
        location: Marco's Car
      - speaker: narrator
        text: The car moving. City light shifting through the windows. He's looking forward.
        location: Marco's Car
      - speaker: Marco
        text: My IPO closes in thirty days. This is a key moment for Vela, my company. For me.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1696b2b9-e44d-49e7-a72c-3221c79d0c54.mp3
      - speaker: Marco
        text: I can't leave anything to chance.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/be97c376-49b8-4f27-a890-d5ef64e2d9c9.mp3
      - speaker: Marco
        text: The institutional investors I need — most of them come from old families.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/43b6d418-8fae-435c-9607-9ff443871c1f.mp3
      - speaker: Marco
        text: They don't trust where I came from. I don't belong in their world.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/2479dbcd-467d-434d-bffd-fb9363b75c98.mp3
      - speaker: Marco
        text: But you do. Nora Hampton. I know who you are. Your family is important in that world.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ed5f9663-dbb6-4b7b-9cfb-23b457a9582e.mp3
      - speaker: Nora
        text: Was important, Mr. Diaz. My family's been broke for a while now.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b60fc4ae-719b-4fb4-9e4a-e6863be9ed1e.mp3
      - speaker: Marco
        text: Marco. Maybe. But your name remains.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6a0af25b-76ff-4c1f-a751-8587a8fae6d9.mp3
      - speaker: Marco
        text: Here's my offer. Thirty days. We appear together — dinners, events, the right rooms.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/7ff9d669-286a-4910-acb2-e1ce55381a30.mp3
      - speaker: Marco
        text: As a couple. Credible enough that they believe it.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/fd70e58a-4b79-4d65-8373-b623675662e4.mp3
      - speaker: Marco
        text: In exchange — your mother's medical bills. All of them. Cleared.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ff8f73b3-ebbe-4cd6-afa8-6e088992792e.mp3
      - speaker: narrator
        text: He reaches into his jacket. Places a small piece of paper on the leather between you.
        location: Marco's Car
      - speaker: Marco
        text: That should cover it all.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/d3f975aa-d26b-4cc7-b64d-71fbe052ec20.mp3
      - speaker: narrator
        text: You take the paper. Look at it.
        location: Marco's Car
      - speaker: Nora
        text: How do you—
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9ba97197-24d1-49eb-a6c6-b07ca985cd19.mp3
      - speaker: Marco
        text: Doesn't matter.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bf66768b-877a-4f1e-9b1d-032dd28d7ca4.mp3
      - speaker: narrator
        text: You set the paper back on the seat. Your hand in your lap closes slightly. Releases.
        location: Marco's Car
      - speaker: narrator
        text: You're looking forward. The city moving past your window.
        location: Marco's Car
      - speaker: Nora
        text: You didn't have to come all the way here.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/bb751f62-6dfe-4c98-ab30-da089c9f5e64.mp3
      - speaker: narrator
        text: He turns to look at you.
        location: Marco's Car
      - speaker: Marco
        text: I needed to know who I was dealing with.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/276ca4df-2465-434c-9385-154c0063822c.mp3
      - speaker: narrator
        text: He looks back out his window. You file it. Look back out yours.
        location: Marco's Car
      - speaker: narrator
        text: The city moving. Neither of you looking at the other.
        location: Marco's Car
      - speaker: narrator
        text: The car stops. Your building visible through the window.
        location: Marco's Car
      - speaker: Nora
        text: I need to think about it.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/801fe71f-c5f4-4d49-8ec2-1f8d386a47b8.mp3
      - speaker: Marco
        text: Good.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/72079fd2-d4d2-4ea4-8217-4eae9afbe595.mp3
      - speaker: narrator
        text: Your hand on the door handle. You open it. City sound enters — traffic, wind.
        location: Marco's Car
      - speaker: narrator
        text: You stand half in, half out. Still not turned to him.
        location: Marco's Car
      - speaker: Nora
        text: For the record — I was about to nail you on that case.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/465615b4-b543-44d9-a222-f6401694d8d5.mp3
      - speaker: Marco
        text: Maybe.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1a85f90c-709f-4e82-b4ec-fe97aa250316.mp3
      - speaker: Marco
        text: Not good enough though.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b5e7cb59-c265-4a6a-aa8e-f840452a1747.mp3
      - speaker: narrator
        text: You step out. The door closes. City sound cuts off.
        location: Marco's Car
      - speaker: narrator
        text: 'Through the glass from outside: you walking away. Not looking back.'
        location: Marco's Car
      - speaker: narrator
        text: He's watching you through the window. The car doesn't move.
        location: Marco's Car
      - speaker: narrator
        text: You round the corner. Gone. He's still watching the empty street.
        location: Marco's Car
      locations:
      - name: Marco's Car
    hooks:
      on_enter:
      - type: emit_media
        kind: video
        url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/video/dialogue/87910/upload_925b944d-9585-4535-b791-37d7f66af3b7.mp4
