      - speaker: Nora
        text: Good.
        target: Marco
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2080f844-9f61-4a6f-be50-eb142c146a49.mp3
      - speaker: Marco
        text: I should have asked you to stay.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/307da8fb-4aba-400d-943a-1c3444f78c5f.mp3
      - speaker: narrator
        text: You flip the phone face down on the nightstand. Knuckles against your forehead. Eyes close.
        location: Law Firm Office
      - speaker: narrator
        text: Three seconds. You open your eyes. Pick the phone up again.
        location: Law Firm Office
      - speaker: narrator
        text: You tap open the reply field. Your thumb types.
        location: Law Firm Office
      - speaker: narrator
        text: 'Draft: I would have.'
        location: Law Firm Office
      - speaker: narrator
        text: You look at the cursor. Press delete until the field is empty. Set the phone face down.
        location: Law Firm Office
      - speaker: narrator
        text: Harwick & Crane. Your office. Midday. Documents in front of you, untouched. You stare at nothing.
        location: Law Firm Office
      - speaker: narrator
        text: Phone in hand. You look at the message one more time. Set it face down on the desk.
        location: Law Firm Office
      - speaker: narrator
        text: Leila appears in the doorway. Already inside. No knock.
        location: Law Firm Office
      - speaker: narrator
        text: She crosses to the desk. Sets a paper bag down. Sits across from you without being invited.
        location: Law Firm Office
      - speaker: narrator
        text: She opens the bag. Pulls out a chocolate-frosted donut. Slides it across the desk alongside a coffee cup.
        location: Law Firm Office
      - speaker: narrator
        text: The donut stops inches from your keyboard.
        location: Law Firm Office
      - speaker: Leila
        text: Hey gorgeous.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/8683cb64-0f53-40b7-820c-d22d3a2bff00.mp3
      - speaker: narrator
        text: You pick up the coffee. Hold it. Don't touch the donut.
        location: Law Firm Office
      - speaker: Leila
        text: Chocolate and coffee. Don't say I never take care of you.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/f926b134-6f89-411f-a1e6-7c87bc1575b1.mp3
      - speaker: narrator
        text: She looks at your face. At the untouched documents.
        location: Law Firm Office
      - speaker: Leila
        text: You look awful. What's going on?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/fc78f65e-6f21-4b99-9a1c-72a2c7983fef.mp3
      - speaker: narrator
        text: You look at the window behind her.
        location: Law Firm Office
      - speaker: Nora
        text: I cleaned my apartment at 3am.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/311fc5e9-6ad1-4c26-96e3-7e2077e724f0.mp3
      - speaker: narrator
        text: She stops her hand halfway to the bag. Blinks.
        location: Law Firm Office
      - speaker: Leila
        text: You did what?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/954f20b3-a39a-49e4-814a-9f62ee582b03.mp3
      - speaker: narrator
        text: She reads you. Pulls a second donut from the bag. Settles back. Takes a bite.
        location: Law Firm Office
      - speaker: Leila
        text: Nora, you always clean like this when—
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/0e17e581-87a2-4e03-afbf-f401ad06a5c0.mp3
      - speaker: narrator
        text: Your knuckles tighten around the cup.
        location: Law Firm Office
      - speaker: Nora
        text: Nothing happened.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/6a3dcd0e-2f5f-419a-a0ab-d3608b9967b2.mp3
      - speaker: narrator
        text: Two-second silence. You keep your eyes on your coffee.
        location: Law Firm Office
      - speaker: Leila
        text: Did something almost happen?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/d083d5cc-8886-4b90-a652-3a07fceb38d7.mp3
      - speaker: narrator
        text: You stay still. Don't answer. Don't shake your head.
        location: Law Firm Office
      - speaker: Leila
        text: Oh.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/3f736878-7b45-49ec-bee6-524cba4c9037.mp3
      - speaker: Leila
        text: Oh okay.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/f20d514c-834d-4447-abf7-b2a9beb4f11f.mp3
      - speaker: narrator
        text: You pull a stack of documents toward yourself. Turn a page. Leila watches the move.
        location: Law Firm Office
      - speaker: narrator
        text: She leans forward. Forearms flat on the desk.
        location: Law Firm Office
      - speaker: Leila
        text: Your mom's bills?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/13de8c5f-80dc-486a-9c74-672d12ca2b88.mp3
      - speaker: Nora
        text: Almost clear.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/40f40425-8f76-4750-8d38-042b00f43821.mp3
      - speaker: Leila
        text: So you got everything you came for.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/34eb8789-2624-4731-ae20-761e5f4aef02.mp3
      - speaker: narrator
        text: You close the documents. Hands flat on the cover.
        location: Law Firm Office
      - speaker: Nora
        text: Yes.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/4b432b80-b481-4631-be83-4153053c2c21.mp3
      - speaker: narrator
        text: Leila taps the edge of the coffee sleeve lightly.
        location: Law Firm Office
      - speaker: Leila
        text: And how do you feel about that?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/7f75adda-1ab8-418a-8f73-cbcd8114a07a.mp3
      - speaker: Nora
        text: As you said. It's what I came for.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/422c6834-5403-4274-b1f6-5581a43b351c.mp3
      - speaker: narrator
        text: She nods once. Looks at the closed documents. Looks back at you, unconvinced.
        location: Law Firm Office
      - speaker: Leila
        text: Is it though?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/d2151638-5b61-41a7-a09c-99c06556558e.mp3
      - speaker: narrator
        text: You look up slowly.
        location: Law Firm Office
      - speaker: Leila
        text: What are you actually afraid of? That you like him?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/31a4d983-b6ff-4cc7-88ea-a8c3eb2fca9b.mp3
      - speaker: Leila
        text: That some of what he did unsettles you?
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/288cdadd-54c6-41e0-a505-f601844d538f.mp3
      - speaker: narrator
        text: You drop your gaze to the rim of the cup. Both palms around it.
        location: Law Firm Office
      - speaker: Nora
        text: And what if I am?
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a7862788-a9f1-4982-b94f-27c145924fd0.mp3
      - speaker: narrator
        text: Leila stays still. Watches your hands.
        location: Law Firm Office
      - speaker: Nora
        text: He's not who I thought he was at the beginning. And I don't know what to do with that.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/cf73a687-b20d-45d6-9515-76bde6b75e5d.mp3
      - speaker: narrator
        text: She looks at you for a long moment. Uncrosses her legs. Leans in.
        location: Law Firm Office
      - speaker: Leila
        text: You built every wall you have because of your father.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/c4bf9b42-eeab-49d8-8004-81c1d05656f0.mp3
      - speaker: Leila
        text: And this man walked through all of them without you noticing.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/c3aed0e0-8895-441c-954a-9011a53e72bf.mp3
      - speaker: narrator
        text: You say nothing. Eyes on the cup.
        location: Law Firm Office
      - speaker: narrator
        text: Your hands grip the white ceramic. Neither of you moves.
        location: Law Firm Office
      - speaker: Leila
        text: I know that terrifies you. But Nora — that's not a bad thing.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/3cb11f05-ab9f-4731-9c1d-a9a28b65df6c.mp3
      - speaker: narrator
        text: She reaches for her own coffee. Takes a sip. Looks out at the glass partition. Casual.
        location: Law Firm Office
      - speaker: Leila
        text: Oh — Nick told me something funny.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/e8c88976-6d93-48f6-9fce-2b9958bbec56.mp3
      - speaker: narrator
        text: You look up.
        location: Law Firm Office
      - speaker: Leila
        text: Marco told him he wants to take a break after the IPO. Travel a bit. Maybe with someone.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/c0dd949b-cff9-4e32-af0c-3fc52a5b3857.mp3
      - speaker: narrator
        text: A beat. She takes another bite of her donut.
        location: Law Firm Office
      - speaker: Leila
        text: Marco doesn't take holidays. Ever.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/4915a7e8-ade3-4260-8a06-5e5d1abdf6ac.mp3
      - speaker: narrator
        text: You look directly at her. She holds your gaze. Neither speaks.
        location: Law Firm Office
      - speaker: narrator
        text: She wipes her hands with a paper napkin. Stands. Smooths her skirt.
        location: Law Firm Office
      - speaker: narrator
        text: She leans across and squeezes your hand once on the desk. Picks up her bag.
        location: Law Firm Office
      - speaker: Leila
        text: Six more days, Nora. Think about what you want to happen after.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/10d98ed3-4abf-4c96-8457-152658146b42.mp3
      - speaker: narrator
        text: She walks to the door. Stops at the threshold. Turns back once.
        location: Law Firm Office
      - speaker: Leila
        text: Whatever that is — I'm on your side.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/b46a22c9-7afd-4041-bec7-9bfc22d205ad.mp3
      - speaker: narrator
        text: 'A small smile. Not triumphant. Just: I see you. She steps out. Gone.'
        location: Law Firm Office
      - speaker: narrator
        text: You're alone. Documents untouched. Coffee in front of you. Donut untouched.
        location: Law Firm Office
      - speaker: narrator
        text: You look at the door. Don't move.
        location: Law Firm Office
      locations:
      - name: Law Firm Office
