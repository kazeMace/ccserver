        url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/video/dialogue/74664/upload_035fb507-e5e4-4b01-a024-23a7de1aa3ba.mp4
        title: 律所办公室。一张你和 Marco 的照片...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_11.srt
    context:
      synopsis: 'The photograph from the party circulates publicly — Nora looks at her own face in it and does not look like someone performing.

        At the firm a senior partner raises a conflict of interest question: Nora co-hosted a private event with a client-connected figure.

        She cannot explain the arrangement without exposing it and cannot deny the relationship without contradicting the photograph.

        Her partner track is now genuinely at risk.

        That evening she types a reply to Marco before she finishes deciding to send it.'
      dialogue_history:
      - speaker: narrator
        text: Your apartment, morning. Coffee in hand, phone in the other.
        location: Law Firm Office
      - speaker: narrator
        text: A notification badge appears. You tap it.
        location: Law Firm Office
      - speaker: narrator
        text: An Instagram post fills the screen — the photograph from the party. Posted by an unidentified guest account.
        location: Law Firm Office
      - speaker: narrator
        text: The likes counter is already moving.
        location: Law Firm Office
      - speaker: Nora
        text: What the—
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9883d0ae-9f4c-4323-9f0c-6216c4ab990a.mp3
      - speaker: narrator
        text: You stop. Don't finish it. Your eyes move across the post.
        location: Law Firm Office
      - speaker: narrator
        text: The likes counter ticking upward. His hand at the small of your back. Your own face.
        location: Law Firm Office
      - speaker: narrator
        text: You look at your own face for a long moment. The counter keeps moving.
        location: Law Firm Office
      - speaker: narrator
        text: Two message bubbles appear. Leila has forwarded you the photograph.
        location: Law Firm Office
      - speaker: Leila
        text: Nora Hampton is that you?? Because I don't recognize her and I love her.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/cfbeafe0-cc20-4581-ba7b-048995c310bd.mp3
      - speaker: narrator
        text: You read them. Don't reply. Phone face down on the counter. You pick up your coffee. Go.
        location: Law Firm Office
      - speaker: narrator
        text: You arrive at Harwick & Crane. Moving toward your desk.
        location: Law Firm Office
      - speaker: narrator
        text: Before you reach it, Harwick steps out of his office.
        location: Law Firm Office
      - speaker: Harwick
        text: Ms. Hampton. A moment.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/c3e8bb7f-f7f8-4678-8171-43782e98caa6.mp3
      - speaker: narrator
        text: A gesture toward his office. You go in. The door closes.
        location: Law Firm Office
      - speaker: narrator
        text: His phone is face up on the desk. The Instagram post visible on the screen.
        location: Law Firm Office
      - speaker: narrator
        text: You stand across from him. Your expression doesn't change.
        location: Law Firm Office
      - speaker: Harwick
        text: Ms. Hampton. It has come to our attention that you may be in a personal relationship with Marco Diaz.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/8edd58e4-561e-4186-a818-de06597fa572.mp3
      - speaker: narrator
        text: He turns his phone to face you. You look at it.
        location: Law Firm Office
      - speaker: Harwick
        text: Mr. Diaz operates within our professional orbit.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/a84be545-6f51-4fdf-bdaf-1552e4b1d89f.mp3
      - speaker: Harwick
        text: Personal involvement in that world is a breach of our conflict of interest policy.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/dce2d57d-834d-4abb-95ba-4212e2f97370.mp3
      - speaker: Harwick
        text: A breach puts your position here at serious risk.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/3be36591-c47a-496c-8867-ba635338a24b.mp3
      - speaker: Harwick
        text: I'm not asking you to explain yourself today. But think about this — I trust you'll know what to do.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/f0d025c3-372a-4ab3-a25a-69b87fe581e2.mp3
      - speaker: Nora
        text: Understood. You won't need to raise this again, sir.
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/0ba5b95a-100f-40cd-aacb-42aaf2c4d518.mp3
      - speaker: Harwick
        text: Good. That will be all.
        target: Nora
        location: Law Firm Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/13397/4b6d4c1a-feec-4924-a707-bd35d987532a.mp3
      - speaker: narrator
        text: You walk directly from his office to your desk. Sit.
        location: Law Firm Office
      - speaker: narrator
        text: The office is at normal capacity around you. You are still inside it.
