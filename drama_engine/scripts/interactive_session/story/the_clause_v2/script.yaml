        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/7831bbc4-8597-4211-baae-adbbe137e0db.mp3
      - speaker: narrator
        text: Silence. You look at his profile. He doesn't turn. You look back out your window.
