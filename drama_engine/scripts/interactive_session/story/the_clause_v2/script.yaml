    context:
      synopsis: The crisis response preparation erupts into the first real argument. He loses control. She walks out. She comes back. Neither of them says anything about what just happened.
      dialogue_history:
      - speaker: narrator
        text: His penthouse. Morning light. He's at his desk, document in hand.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You're sitting closer to him than yesterday. Your bag already in your hand.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: I can't trust you if you're like that. I've been there before.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3202cace-8158-484b-a75d-746da11b7b8d.mp3
      - speaker: Nora
        text: I don't intend to live that again.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a8a462d6-19d0-4bdc-9a6e-5fa4f0f075f5.mp3
      - speaker: narrator
        text: He sets the document down. Looks at you.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: I did what I had to do. You won't understand.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/8beb13a8-dfd1-4faa-8d2e-72fc8d95d528.mp3
      - speaker: narrator
        text: You pick up your bag. Walk to the door. Stop. Back to him.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Maybe. But that doesn't make it right.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/fe70ad88-1297-4f1c-988e-eaaa85b4ec3a.mp3
      - speaker: narrator
        text: You leave.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: He closes the document. Sits back. Eyes on the ceiling.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Harwick & Crane. A meeting room. Door closed.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Documents spread across the table between you. Both working.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You set your document down. He is still reading his.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Before we do anything public we need to know exactly what Seth has.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: What's in the leak, what isn't, what he's holding back. Then we decide how to act.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He looks up. Sets his document down.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Absolutely not. We go out there today. We hit back hard before he owns this story.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: A press conference today without that information is walking into a room blind.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Every minute we sit here he's winning. The investors are reading his version right now.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: We go out there and we fight.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Going out there unprepared gives him exactly what he wants. He knows you, Marco.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He's counting on you to react.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Seth doesn't scare me.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You look at him.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: That's not the point. Is this about the company or your ego?
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He goes still. Then he's on his feet, moving.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You have no idea what I've had to do to get here. None.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: So don't stand there and question my judgment!
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You don't move. Your chin stays level.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Marco—
        location: Law Firm Meeting Room
      - speaker: narrator
        text: This is my company! My fight! You're here because I'm paying you to be here. Nothing more!
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Silence.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You set your document down carefully. Gather your bag, your phone.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your pen falls off the table to the floor. You don't pick it up.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You walk to the door. Don't look back.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He stands in the room. Eyes on the door you just walked out of. Closes his eyes. Opens them.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: The corridor. You stop. Your back against the wall.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your phone screen lights up.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Hey gorgeous. I guess these days must be intense.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Remember, you're the strongest person I know — love you.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: The corner of your mouth moves up. Stops. You push off the wall.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You go back to the door. Push it open.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You stop in the doorway.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your pen is on the table. On your side. It was on the floor when you left.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: A coffee cup on your side of the table.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He is at his seat, eyes on his document. He doesn't look up.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You cross to your seat. Sit down. Open your document.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You look up. He looks up. Your eyes meet across the table.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You look back at your documents. You pick up the coffee cup. Take a sip.
        location: Law Firm Meeting Room
      locations:
      - name: Marco's Penthouse (day)
      - name: Law Firm Meeting Room
