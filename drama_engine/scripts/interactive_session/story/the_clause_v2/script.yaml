      - Player_1
    schedule:
      mode: none
    participant_action:
      kind: none
      response:
        mode: none
    controller_action:
      enabled: true
      controller:
        type: human
        auto_advance: true
      kind: cinematic
      choices:
      - id: go_home
        text: Go home
        to: node_21_attack
      free_input:
        enabled: true
        guards:
          input:
            - name: character_existence
            - name: content_safety
          output:
            - name: output_character_existence
            - name: schema_conformance
        mapper:
          enabled: true
          executor: llm
          fallback: generate
        generation:
          narration_style: dialogue_sequence
          interaction_mode: branch_choice
          choices_count: [3, 3]
          constraint:
            type: free
          presentation: cinematic
    publication:
      messages:
      - audience:
          scope: story
        content:
          text: 回到你长大的街区。旧日的自己与如今的 Nora Hampton 在此刻重叠。你回家了。
    resolution:
      effects:
      - type: increment_state
        path: GAME.round
        amount: 1
    hooks:
      on_enter:
      - type: emit_media
        kind: video
        url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/video/dialogue/96436/upload_6ee45c7b-a89d-42d6-a76a-b05683ed4070.mp4
        title: 回到你长大的街区。旧日的自己与如今的 N...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_20.srt
    context:
      synopsis: Marco invited her. She said yes. He takes her to the Bronx — the building, the street, the people who knew him before he was anyone. She sees who he was. He shows her why Vela matters. They
        get closer through conversation and dance.
      dialogue_history:
      - speaker: narrator
        text: The street. Daytime. Older brick buildings. A diner visible in the background. Warmer, greener light.
        location: New York Streets
      - speaker: narrator
        text: Latin music faint in the distance.
        location: New York Streets
      - speaker: narrator
        text: You arrive. Stop. Look at the building. Look at the street.
        location: New York Streets
      - speaker: narrator
        text: Marco is already outside, waiting. No performance register — different from every other episode.
        location: New York Streets
      - speaker: narrator
        text: He starts walking. You fall in beside him.
        location: New York Streets
      - speaker: Marco
        text: Thanks for coming.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bdc8beb8-20a3-4561-bb1b-68f8c13b9629.mp3
      - speaker: narrator
        text: You don't answer. You walk.
        location: New York Streets
      - speaker: narrator
        text: Walking side by side. The street moves quietly around you. Your arms brush. Neither acknowledges it.
        location: New York Streets
      - speaker: Nora
        text: Why here?
        target: Marco
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/585eef1c-4598-4d8a-8349-b48d1eecbe9c.mp3
      - speaker: Marco
        text: Before you decide what you think of me — I wanted you to understand something. About me. About Vela.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6101546e-69a7-48c0-94fb-8a5d9f06d428.mp3
      - speaker: narrator
        text: He looks at a building as you pass it.
        location: New York Streets
      - speaker: Marco
        text: I grew up right there. Third floor. My mom worked three jobs to keep that apartment.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/e5c9a915-90c8-48bb-94a7-899e3f7db5a0.mp3
      - speaker: Marco
        text: Vela was supposed to be for people like her. That's the whole thing.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3230127c-57fd-4a02-91cc-9494cf2f9c14.mp3
      - speaker: narrator
        text: You walk beside him. Don't answer.
        location: New York Streets
      - speaker: Nora
        text: Tell me about Seth. What was he like. Before it went wrong.
        target: Marco
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3705747a-b439-4fc8-8871-802567ccea1a.mp3
      - speaker: narrator
        text: He looks at you. Then back at the street. He starts to answer.
        location: New York Streets
      - speaker: narrator
        text: Carmen comes out of a building ahead of you. She sees Marco. Goes straight to him.
        location: New York Streets
      - speaker: narrator
        text: She touches his face with both hands. He lets her. Completely still. No deflection.
        location: New York Streets
      - speaker: Carmen
        text: Ay, Marco. How long has it been? Come here, let me look at you.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/d8ba4a8d-bbd2-4145-80e9-addde016513b.mp3
      - speaker: Carmen
        text: You have grown so much. And look at this suit, mijo.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/be3a6be8-5af0-4260-b119-79c72e7cf20a.mp3
      - speaker: narrator
        text: She turns to you. Grabs your hand — warm, no ceremony.
        location: New York Streets
      - speaker: Marco
        text: Nora, this is Carmen. She lived next door our whole lives.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/324b9079-fbe0-415d-b601-1a65c4b03181.mp3
      - speaker: Carmen
        text: And who is this? Mijo, she's beautiful. But so pale, so thin —
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/1f9c999a-7674-40d9-99bb-0aea980a046f.mp3
      - speaker: Carmen
        text: Marco, you should be taking care of your girl.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/62c85958-82b1-4e27-a951-d69376169016.mp3
      - speaker: narrator
        text: She turns back to you, still holding your hand.
        location: New York Streets
      - speaker: Carmen
        text: If he gives you trouble, you come to me. I'll straighten him up.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/a98d61a9-a28f-46a3-9c38-a0bab2b74be3.mp3
      - speaker: Nora
        text: I'll keep that in mind.
        target: Marco
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/8577abda-95ed-4695-b187-66e5ff36e95c.mp3
      - speaker: narrator
        text: Marco starts walking ahead.
        location: New York Streets
      - speaker: narrator
        text: Carmen holds your hand a beat longer. Watches him go. Leans in.
        location: New York Streets
      - speaker: Carmen
        text: We love him, you know. Did you know he bought this whole street? So we could stay.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/52cc7924-cf35-40fa-a25b-4954588843f2.mp3
      - speaker: Carmen
        text: That's your Marco.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/d1a4eb13-2ff4-4495-be1e-338a66ed65f4.mp3
      - speaker: narrator
        text: She releases your hand.
        location: New York Streets
      - speaker: narrator
        text: You stop for one beat. Your eyes widen slightly.
        location: New York Streets
      - speaker: narrator
        text: You look at the street around you — the buildings, the diner — then at Marco walking ahead.
        location: New York Streets
      - speaker: narrator
        text: A small involuntary smile. Then you catch up.
        location: New York Streets
      - speaker: narrator
        text: Walking again. The serious register returns. He picks up where he left off before Carmen.
        location: New York Streets
      - speaker: Marco
        text: When we met, Seth was brilliant. His energy, how he could convince people.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3568848a-a4d3-4cfd-ada6-3ca6665a2fec.mp3
      - speaker: Marco
        text: And he didn't care where I came from. Only ideas and results mattered to him.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bc6c8171-76b6-482f-81b4-0024ea366262.mp3
      - speaker: Marco
        text: At any cost.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/06ccc36b-9e6c-49a1-b6a7-894f18c658a2.mp3
      - speaker: narrator
        text: You don't respond. You already know what that cost was.
        location: New York Streets
      - speaker: narrator
        text: Latin music now audible clearly. People dancing further down the street.
        location: New York Streets
      - speaker: Carmen
        text: Marco, Nora — come dance!
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/272afdba-c7ee-49e4-9a27-8fc0fe81d8ab.mp3
      - speaker: Marco
        text: No, sorry Tia — I'm too tired.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3876b668-2e2c-4fca-99d9-0b9b8648b3ea.mp3
      - speaker: Carmen
        text: What's the matter, mijo? Rich boy forgot how to dance?
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/17045/cc749d11-1e57-4adb-a9a1-27977da7e890.mp3
      - speaker: narrator
        text: He stops walking.
        location: New York Streets
      - speaker: narrator
        text: He turns to you.
        location: New York Streets
      - speaker: Marco
        text: Let's go.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/77e7507a-d98f-4dfd-8363-d422a9c8cdae.mp3
      - speaker: narrator
        text: He doesn't wait. Grabs your hand. Pulls you toward the dancers.
        location: New York Streets
      - speaker: Nora
        text: What? But—
        target: Marco
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/664e1a80-0b07-41fb-8b4e-31726d3ce26e.mp3
      - speaker: narrator
        text: He gets you into position. Takes your hand. His other hand on your waist. Pulls you closer.
        location: New York Streets
      - speaker: narrator
        text: Your eyes widen. Surprised. Attracted.
        location: New York Streets
      - speaker: Nora
        text: I've never danced like this.
        target: Marco
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9a50d4ae-d2f2-4a87-8b70-11bb6230d07b.mp3
      - speaker: Marco
        text: Follow my lead.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ea32946f-03b0-45a0-9de9-771a5e815dc4.mp3
      - speaker: narrator
        text: You start dancing. He is completely at ease — natural, unhurried, no performance.
        location: New York Streets
      - speaker: Marco
        text: Relax. Let the rhythm in.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b0d36b5c-516a-4e3b-9d1d-c67d5ba2dcd8.mp3
      - speaker: narrator
        text: He makes you spin gently. You laugh. Completely unguarded.
        location: New York Streets
      - speaker: narrator
        text: You get closer. Neither performing anything for anyone.
        location: New York Streets
      - speaker: narrator
        text: Wide shot — the street, the music, two people in the middle of a neighborhood gathering.
        location: New York Streets
      - speaker: narrator
        text: The dance ends. Neither acknowledges it. You keep walking.
        location: New York Streets
      - speaker: narrator
        text: You've stopped walking.
        location: New York Streets
      - speaker: narrator
        text: You shiver. Wrap your arms around yourself.
        location: New York Streets
      - speaker: narrator
        text: He looks at you. Takes his jacket off. Places it on your shoulders.
        location: New York Streets
      - speaker: narrator
        text: You don't protest. Pull it slightly closer around yourself.
        location: New York Streets
      - speaker: Marco
        text: I haven't danced like that in a long time.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f82f6eec-c877-4503-b7c2-68b48fda147f.mp3
      - speaker: Nora
        text: It was fun though.
        target: Marco
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f2b09649-6674-45cf-b73d-17b20f4d79a8.mp3
      - speaker: Marco
        text: I'm glad you came.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1a8532b8-d10b-480a-96de-d754caf77f33.mp3
      - speaker: Nora
        text: Me too.
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/c61b741a-98c1-481c-91ec-57359aa8b2d5.mp3
      - speaker: Marco
        text: Whatever the files say — this is what I am trying to protect. That will never change.
        target: Nora
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/57b59074-d896-4678-95bb-0f3b052fbbbd.mp3
      - speaker: Nora
        text: I get it now.
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f163094e-cba6-423b-8e9b-f6c5ee3f743e.mp3
      - speaker: narrator
        text: You get closer.
        location: New York Streets
      - speaker: Nora
        text: Thank you for sharing this with me... and for tonight.
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/1c3e3fd6-2755-4a8d-b8b8-e6c187442807.mp3
      - speaker: narrator
        text: He looks at you.
        location: New York Streets
      - speaker: narrator
        text: You walk. Hand in hand.
        location: New York Streets
      locations:
      - name: New York Streets
