    context:
      synopsis: Nora panics. Marco handles Seth alone. The outcome is uncertain. the contract ends, the bills are paid, neither of them knows what comes next.
      dialogue_history:
      - speaker: narrator
        text: The investors are looking at you. Seth is looking at you.
        location: Event Space (Day)
      - speaker: narrator
        text: Your mouth opens. The words are there. You can't make them come.
        location: Event Space (Day)
      - speaker: narrator
        text: Your weight shifts back. The champagne glass suddenly heavy in your hand.
        location: Event Space (Day)
      - speaker: narrator
        text: Seth's smile widens. He's already turning back to the room.
        location: Event Space (Day)
      - speaker: Seth
        text: I think we have our answer.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/7d335f5f-f069-4955-8151-a2a84dd9d792.mp3
      - speaker: narrator
        text: Marco steps in front of you. His glass raised. The room turns.
        location: Event Space (Day)
      - speaker: Marco
        text: I built this company from nothing. Not from a name, not from a network, not from inherited capital.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b270d103-fe80-49ca-b5f0-cbab869dc4f6.mp3
      - speaker: Marco
        text: From work.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ae3cfb2b-c4f8-4153-9452-b55243c14260.mp3
      - speaker: Marco
        text: The vision that built Vela is the same vision that will take it forward. I'll build what comes next.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3bf7ede0-f249-45e0-92f4-42d146526aae.mp3
      - speaker: narrator
        text: Seth takes one step forward.
        location: Event Space (Day)
      - speaker: Seth
        text: That's exactly what concerns me.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/e0258083-1046-4040-b468-b45788765690.mp3
      - speaker: narrator
        text: Marco does not look at Seth. Does not answer.
        location: Event Space (Day)
      - speaker: narrator
        text: He turns his head toward you. One dismissive look. Turns back to the investors.
        location: Event Space (Day)
      - speaker: narrator
        text: The investor cluster begins to break apart. Two investors move away, speaking quietly.
        location: Event Space (Day)
      - speaker: narrator
        text: A third extends his hand toward Marco. Marco shakes it. Then two more.
        location: Event Space (Day)
      - speaker: narrator
        text: Nick moves through the room to Marco's right, speaking to individual investors.
        location: Event Space (Day)
      - speaker: narrator
        text: You stand in the same position. You have not moved.
        location: Event Space (Day)
      - speaker: narrator
        text: You watch Marco work the room. He does not look at you again.
        location: Event Space (Day)
      - speaker: narrator
        text: The last investors move toward the exit. Two stop to shake Marco's hand. He nods. They leave.
        location: Event Space (Day)
      - speaker: narrator
        text: Nick catches Marco's eye from across the room. Marco gives one small nod. Nick walks toward the exit.
        location: Event Space (Day)
      - speaker: narrator
        text: Marco looks up from the last handshake. He scans the room.
        location: Event Space (Day)
      - speaker: narrator
        text: You are standing near the window. You have not left.
        location: Event Space (Day)
      - speaker: narrator
        text: Marco crosses the room toward you. Stops in front of you. A half-meter between you.
        location: Event Space (Day)
      - speaker: narrator
        text: Neither speaks for two seconds.
        location: Event Space (Day)
      - speaker: Nora
