        Seth appears at her elbow, plants the first public doubt about the IPO, then moves on.

        A woman stops Nora — her mask drops for one second afterward, anger or grief. Marco sees the scene from across the room.'
      dialogue_history:
      - speaker: narrator
        text: The Event Space at night. Candles, ivory linen, the Manhattan skyline through tall framed windows.
        location: Event Space (Night)
      - speaker: narrator
        text: The Empire State Building visible through the glass.
        location: Event Space (Night)
      - speaker: narrator
        text: You and Marco enter together. His hand at the small of your back.
        location: Event Space (Night)
      - speaker: narrator
        text: He says something quiet — inaudible. You laugh. Genuine, brief, gone.
        location: Event Space (Night)
      - speaker: narrator
        text: The people nearby see it.
        location: Event Space (Night)
      - speaker: narrator
        text: You move through the room. An introduction before Marco can reach for it — you're already there.
        location: Event Space (Night)
      - speaker: narrator
        text: He stops. Watches you from one step behind.
        location: Event Space (Night)
      - speaker: narrator
        text: Two seconds. He's seeing something he didn't expect.
        location: Event Space (Night)
      - speaker: narrator
        text: A man appears at your elbow. Fair, broad, completely comfortable for the room he's in.
        location: Event Space (Night)
