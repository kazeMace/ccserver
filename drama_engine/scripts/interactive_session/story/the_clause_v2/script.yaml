    hooks:
      on_enter:
      - type: emit_media
        kind: video
        url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/video/dialogue/47258/upload_efc7c6f2-4cb9-4d8d-80f0-8b23b284301e.mp4
        title: 第三十天，IPO 现场。对手 Seth ...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_25.srt
    context:
      synopsis: 'The IPO closing event — Nora and Marco move through the room together, not performing.

        Seth finds Nora in front of investors and attacks Marco''s character directly — the background, the gap, the cover-up, the silence.

        Nora engages rather than manages distance. Seth escalates. The room gets quieter.

        Nora looks across the room — Marco is watching her, not the investors, not Seth.

        She makes a decision visible in how she moves.'
      dialogue_history:
      - speaker: narrator
        text: The Event Space. Daytime. Large windows. Natural light.
        location: Event Space (Day)
      - speaker: narrator
        text: Investors and board members fill the room. Champagne glasses on dressed tables.
        location: Event Space (Day)
      - speaker: narrator
        text: Marco stands near the center, addressing a cluster of investors. Nick two steps behind him to the right.
        location: Event Space (Day)
      - speaker: narrator
        text: You enter at the far end. Scan the room. Your eyes stop on Marco.
        location: Event Space (Day)
      - speaker: narrator
        text: You cross toward him. He turns his head toward you before you reach him.
        location: Event Space (Day)
      - speaker: narrator
        text: You stand beside each other. Nick looks at you both from his position. You exchange a nod.
        location: Event Space (Day)
      - speaker: Marco
        text: Ready?
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/e00a1445-fb64-4639-977a-f03dc83073f7.mp3
      - speaker: Nora
        text: Let's make it happen.
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/354a67d1-67e3-4057-8b5e-a155489b738a.mp3
      - speaker: narrator
        text: A board member steps toward Marco and extends his hand. Marco turns to shake it.
        location: Event Space (Day)
      - speaker: narrator
        text: Seth moves immediately. He was watching for the gap.
        location: Event Space (Day)
      - speaker: narrator
        text: He steps beside you before you have turned away from Marco.
        location: Event Space (Day)
      - speaker: Nora
        text: I don't have time for you.
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9d735d93-7d59-4380-bd0d-adfff8592f59.mp3
      - speaker: narrator
        text: He falls into step beside you. Keeps talking.
        location: Event Space (Day)
      - speaker: Seth
        text: Seems I underestimated you. You're much tougher than I thought.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/78f8dde4-4dca-4413-acb0-36fe39b905ff.mp3
      - speaker: narrator
        text: You keep walking. Seth reaches out and grabs your arm. You stop.
        location: Event Space (Day)
      - speaker: Seth
        text: Look. Marco's not surviving tonight. You know that. You're too smart not to.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/5fd769d2-793a-4297-b316-703633807aa3.mp3
      - speaker: Nora
        text: You seem desperate, Seth.
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5684684e-f264-4e73-b273-67ed0f282d4a.mp3
      - speaker: Seth
        text: Come work for me. Make real money. You'll be partner in no time.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/4347d485-0069-4889-834a-7e3fdbf6f6f8.mp3
      - speaker: narrator
        text: You look down at his hand on your arm. Then up at him. Cold. Still.
        location: Event Space (Day)
      - speaker: narrator
        text: Seth removes his hand. Uncomfortable smile.
        location: Event Space (Day)
      - speaker: narrator
        text: You look at him once. Full eye contact. One beat.
        location: Event Space (Day)
      - speaker: Nora
        text: I'll see.
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/cc58bd3b-e607-4171-8241-5f258e968fcf.mp3
      - speaker: narrator
        text: You move on. Seth watches you walk back across the room. He raises his glass.
        location: Event Space (Day)
      - speaker: narrator
        text: You return to Marco's side.
        location: Event Space (Day)
      - speaker: narrator
        text: Marco picks up a second champagne glass from a passing tray. Holds it out to you without looking at you.
        location: Event Space (Day)
      - speaker: narrator
        text: You take it. His eyes move briefly across the room toward Seth. Then back to you.
        location: Event Space (Day)
      - speaker: Marco
        text: Everything alright here?
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6e64de54-366a-46fc-b6ca-1763eb832715.mp3
      - speaker: Nora
        text: Nothing I can't handle.
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/d72ba9c9-80c4-4934-bbd2-1516a1a49917.mp3
      - speaker: narrator
        text: Marco steps forward toward the investor cluster. Raises his glass. Conversations stop.
        location: Event Space (Day)
      - speaker: Marco
        text: Everyone, thank you for being here. This is an important moment for Vela and—
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/532b52f4-9f9b-47a4-b5fe-5eb6d18cadfb.mp3
      - speaker: Seth
        text: One minute, please.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/fc5daefa-2e02-411b-8954-0ea088270a5d.mp3
      - speaker: narrator
        text: Seth steps into the cluster from the side. The room turns to look at him. The crowd murmurs.
        location: Event Space (Day)
      - speaker: Seth
        text: I have a question.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/1435d9fb-2d4a-4d17-882e-ac21d39043d8.mp3
      - speaker: narrator
        text: He holds his glass at chest height. His posture is open. He smiles at the investors.
        location: Event Space (Day)
      - speaker: Seth
        text: We all saw the recent issues with the company strategy.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/67e873ec-41fb-456d-998e-60f41fe75c2f.mp3
      - speaker: narrator
        text: He turns his head toward the investors. Does not look at Marco.
        location: Event Space (Day)
      - speaker: Seth
        text: Marco built this company on his values. I respect that. But values have a price.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/48bf9662-49f2-48eb-b2af-5158807bcc69.mp3
      - speaker: Seth
        text: And you're the ones holding the bill.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/2f1a4e8e-5333-4b3d-908e-e312459f7b80.mp3
      - speaker: narrator
        text: He looks at Marco. Smiles. Tilts his head slightly.
        location: Event Space (Day)
      - speaker: Seth
        text: Vela needs someone who can do whatever it takes to maximize profits.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/999d03fe-07a0-40ea-a25d-479eecfd7177.mp3
      - speaker: Seth
        text: This is business, not charity.
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/447561bc-8b0e-485e-937b-2d609ef6d182.mp3
      - speaker: narrator
        text: He looks around the cluster at each investor in turn.
        location: Event Space (Day)
      - speaker: Seth
        text: Is Marco Diaz the right person to lead this company forward?
        target: Nora
        location: Event Space (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/830560e7-3c73-4af8-9016-5b7deda6c41b.mp3
      - speaker: narrator
        text: The room is quiet. Uncomfortable. Investors exchange glances.
        location: Event Space (Day)
      - speaker: narrator
        text: Marco's fists close at his sides. He does not move toward Seth.
        location: Event Space (Day)
      - speaker: narrator
        text: He turns his head and looks directly at you.
        location: Event Space (Day)
      - speaker: narrator
        text: Both fists closed at his sides. Nick has stopped walking. His eyes on you from the far wall.
        location: Event Space (Day)
      - speaker: narrator
        text: The investor cluster murmurs.
        location: Event Space (Day)
      - speaker: narrator
        text: You look at Seth. Then at Marco. Then at the investor cluster.
        location: Event Space (Day)
      - speaker: narrator
        text: You have Seth's offer. You know the full story. You have Marco watching you.
        location: Event Space (Day)
      - speaker: narrator
        text: Your weight shifts. Your chin lifts. Your eyes move to the investor cluster.
        location: Event Space (Day)
      locations:
      - name: Event Space (Day)
