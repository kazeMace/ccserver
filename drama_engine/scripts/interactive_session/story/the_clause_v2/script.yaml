        location: Law Firm Office
      - speaker: narrator
        text: You lie flat on your back, eyes open, staring at the ceiling.
        location: Law Firm Office
      - speaker: narrator
        text: The phone screen lights up. Blue glow across your face.
        location: Law Firm Office
      - speaker: narrator
        text: You reach for it. Scroll through the message thread.
