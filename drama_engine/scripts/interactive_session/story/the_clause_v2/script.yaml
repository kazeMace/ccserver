        title: '''我们一起碾碎他。''你和 Marco 并...'
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_23.srt
    context:
      synopsis: Day 24, late.his penthouse, a late working session, six days left. Two people with their guards completely down. The distance between them reaches its minimum. A phone call stops what was
        about to happen.
      dialogue_history:
      - speaker: narrator
        text: Late. Lamp light only. City visible through the windows.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Documents on the coffee table — fewer than before. Both on the sofa, angled toward each other.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: A half-eaten snack on the table in front of you.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You close a folder. Set it on the table. Lean back into the sofa.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: Six days to the IPO. Still a lot to sort out.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/aac4c8b0-9e76-4cb7-abb5-f35529715ddf.mp3
      - speaker: narrator
        text: Marco looks up from his laptop.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: We'll be ready.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/21d7a0bf-4875-46de-a524-ac189486ed74.mp3
      - speaker: narrator
        text: You pick up a snack. Eat. Neither of you reaches for the next document.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: A beat of silence that neither fills.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He turns slightly toward you on the sofa.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: Can I tell you something without you getting offended?
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/7d34d477-dd02-4059-b6e3-0ece1d0ceb45.mp3
      - speaker: narrator
        text: He leans toward you.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: The party. Here. Two weeks ago. When the food came out.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/a21f8272-b76d-49b0-bbdc-1048f3151a22.mp3
      - speaker: Marco
        text: I've never seen anyone move that fast.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f73b8c28-0dd0-40a4-abad-c55fb6267dec.mp3
      - speaker: narrator
        text: A beat.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You were watching me eat.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2112696c-0a3f-4e5b-a0b7-8ff0a8ebf2f5.mp3
      - speaker: Marco
        text: It's okay. Some people just can't help themselves.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/88e3416a-3ed5-467f-a710-19189dc4b681.mp3
      - speaker: narrator
        text: You grab a cushion. Throw it at him — not hard, the kind of throw that means you like someone.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He catches it.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: Let's talk about self control, Mr. Diaz.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3bba65d4-4715-428a-a8ac-71ad756498f4.mp3
      - speaker: narrator
        text: You stand up. Turn to face him. One finger raised. Hands on your hips.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: A low, controlled, slightly terrible imitation of his voice from Episode 11.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You're here because I'm paying you to be here. Nothing more.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/e65a5c18-4148-4472-9dfa-4a344db4dd0e.mp3
      - speaker: narrator
        text: He goes still for one beat. Then something breaks — he laughs. Not his managed smile. Actually laughs.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: That's not— that's not what I sound like.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c04aabbc-7f83-4d08-bcf7-892bacb71b94.mp3
      - speaker: narrator
        text: 'You give him a look that says: yes it is. You sit back down on the sofa, closer than before.'
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The laughter settles on its own. The room goes quiet in a different way.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: It's been an adventure.
        target: Leila
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/8eabb341-3c0d-48d3-ad71-65a9f8d869b8.mp3
      - speaker: narrator
        text: He looks at you. Nods.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Silence. You're close on the sofa. Neither moves away. The tension builds without either of you naming it.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: I'm getting some water.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a1cda51d-7f53-4d7e-8eba-b84c5d17ba36.mp3
      - speaker: narrator
        text: You get up. Move toward the kitchen.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You reach the sink. Turn the tap.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: It sprays hard to the left — catches you across the shoulder and chest.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: What—
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/24930cee-3604-4a86-a0da-b669d0f66137.mp3
      - speaker: narrator
        text: You grab for it, twist. More pressure, different direction. Water everywhere.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You laugh despite yourself — the kind that arrives before you decide to.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He appears in the kitchen doorway. Sees the scene.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: Let me.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/949c77f0-b335-4825-85a3-d08ab3920107.mp3
      - speaker: narrator
        text: He crosses to you. Reaches past you, hand on the fitting.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The tap finds him immediately — directly in the face.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You're both laughing now. Properly. Nothing performed.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You made it worse.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/baada052-cdf1-45b9-8086-a70ac0508383.mp3
      - speaker: Marco
        text: I can see that.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/5c8d23b5-c89e-463d-bd23-9c938174f4f8.mp3
      - speaker: narrator
        text: He steps back. Takes his shirt off — quick, no announcement, purely practical. Gets down under the sink.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You actually know what you're doing down there?
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/4d45e9b3-5f45-465a-8019-931d3c7ffc3b.mp3
      - speaker: narrator
        text: A beat of work from under the sink. The water cuts off.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He gets up. Wipes his hands. Standing there without his shirt.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: I know how to fix most things.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/089d6391-4e5c-4879-a1d6-c98836370e7d.mp3
      - speaker: Nora
        text: How?
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/bb8461b8-d64a-4399-b138-4df1c7669244.mp3
      - speaker: Marco
        text: Poor people habit. You fix it yourself or it stays broken.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/85bc18ea-fec2-4c6b-b486-0fe6cdba18da.mp3
      - speaker: narrator
        text: You stop laughing. Look at him — the penthouse around him, the city through the windows behind you.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The gap between those two things and the man standing there with his hands just off a pipe.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The laughter has gone. The tension is palpable. Neither moves.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Silence. Standing close — not touching. Water still dripping somewhere in the sink.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You had a moment to step back. You don't take it.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He notices. He leans in slightly. Your faces close the remaining gap — slowly, neither deciding, neither stopping.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: A few inches away from kissing.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The phone on the counter lights up. NICK.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He sees it. Looks at you. Looks at the phone. Picks it up.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: Hey.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/888c6f37-511a-4bf8-a555-9555ebc23c7b.mp3
      - speaker: Nick
        text: Closing dinner venue's confirmed. We're ready.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/86ee85f9-7352-4213-b431-91ab4844a62c.mp3
      - speaker: Marco
        text: Good.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/e66e5433-407f-427f-90f6-88339e7e6bc2.mp3
      - speaker: narrator
        text: He hangs up. Looks at you. The moment is gone.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: I should get going.
        target: Leila
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/42de80f0-0a72-41b8-8f2f-864f44122814.mp3
      - speaker: Marco
        text: Yeah.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/190ab2a8-e946-4ef2-9bed-9ef92f68fc5c.mp3
      - speaker: narrator
        text: Neither moves. A beat longer than it should be.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You reach for a dish towel on the counter. Dry your hands slowly. Don't look at him.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He picks up his shirt from the counter. Leaves the room.
        location: Marco's Penthouse (Night)
      locations:
      - name: Marco's Penthouse (Night)
