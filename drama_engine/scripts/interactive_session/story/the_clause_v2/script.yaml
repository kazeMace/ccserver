        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/9251fe1f-334f-4c4a-bd05-5de0d8e7e21e.mp3
      - speaker: narrator
        text: You look at him. One beat. Look back out your window.
        location: Event Space (Night)
      - speaker: Nora
        text: The man who introduced himself. Before the dinner. Seth Carver.
        target: Leila
