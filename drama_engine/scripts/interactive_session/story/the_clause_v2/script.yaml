        title: 顶层公寓的派对。你留了下来。摘下手镯的那...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_10.srt
    context:
      synopsis: Marco hosts his annual private party — first and second circle, the people around him. This year he prepared it himself. Nora is there as co-host for the first time. Neither of them performs
        anything by the end of it. A guest photographs the moment without either of them noticing. The photograph will circulate. It will reach Harwick & Crane before Nora does. Neither of them knows it
        exists yet.
      dialogue_history:
      - speaker: narrator
        text: The elevator opens. Guests moving through the space, low music, warm amber lighting.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The city through the windows.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You step out. Stop in the doorway. Read the room — who is where, which direction Marco is in.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Then you move.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Marco crosses to meet you. A broad, warm man already beside him.
        location: Marco's Penthouse (Night)
      - speaker: Nick
        text: Nick. We grew up together.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/f1d18a9d-d0eb-4064-a93d-e54156a807a7.mp3
      - speaker: narrator
        text: He looks at you directly.
        location: Marco's Penthouse (Night)
      - speaker: Nick
        text: I've heard a lot about you.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/290324e6-8c31-4b91-8adf-a52431e7b08e.mp3
      - speaker: narrator
        text: You look at Marco. He frowns at Nick — brief, not angry. Nick already knew he would.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Nick doesn't look at Marco.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You turn toward the room together.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You move through it. She handles an introduction before Marco reaches it — already there.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He takes one step back and to your left. You have the introduction. He's visible but not competing.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: A guest stops you both. Female, early thirties, warm, earned her place at Vela.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: "Guest:\tHow did you two meet?"
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: He was very persistent.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/8a226407-c16e-4139-8cb1-b6d728fcd742.mp3
      - speaker: Marco
        text: I had to be.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/204304b6-2b54-44de-84f2-c2b56a7693d1.mp3
      - speaker: narrator
        text: The guest smiles, satisfied. Moves on. You don't look at each other.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Food is out. You pick up a plate. Eat. Unselfconscious. A lot.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Marco across the room, mid-conversation. He glances toward you.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He sees it. Goes still — one beat. One second of something unguarded. Then he recovers.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You didn't see it.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Nick appears beside you. Both facing the room. Both watching Marco across it.
        location: Marco's Penthouse (Night)
      - speaker: Nick
        text: He does this every year. Thanks the people around him. Always hated planning it.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/b4704ea0-b6fe-4443-afe5-9b0535995e10.mp3
      - speaker: Nick
        text: Except this year. He prepared it all day.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/8fc57201-3aa2-4a8d-a032-26308bd4cad7.mp3
      - speaker: narrator
        text: You turn to look at Nick.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You mean — himself?
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/bb84bc12-982e-4744-99c2-bb86fbb532d9.mp3
      - speaker: Nick
        text: Yes. In a way he's old school. Thinks things will only be good if he does them himself.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/08438230-61a8-4d2c-98ca-7f3499430a59.mp3
      - speaker: narrator
        text: You both look at Marco across the room. He's mid-conversation. Laughing at something.
        location: Marco's Penthouse (Night)
      - speaker: Nick
        text: I haven't heard him laugh in a while.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/157d101c-5508-44a1-906d-0c8ccb66d288.mp3
      - speaker: narrator
        text: You say nothing. Still watching Marco.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Nick glances at you. One beat.
        location: Marco's Penthouse (Night)
      - speaker: Nick
        text: Not like that.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/d5f16d10-d611-41d8-ad3a-6812989ff052.mp3
      - speaker: narrator
        text: He moves on. You stay watching Marco across the room.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The party thinning. No guests between you now.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You say something — inaudible. A small precise observation. Not performed.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: His face changes. He laughs — genuine, before he can stop it.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You look up. See him laughing. You laugh too.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Neither of you looks away. Neither reaches for composure.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: A hand enters frame from the edge. A phone raised.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The screen — your faces framed in it. The moment captured.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Neither of you sees it.
        location: Marco's Penthouse (Night)
      locations:
      - name: Marco's Penthouse (Night)
