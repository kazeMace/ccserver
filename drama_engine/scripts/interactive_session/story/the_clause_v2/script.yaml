    context:
      synopsis: Nora accepts Marco's help. The morning after, they work. Late that night, Nora finds the document that exposes both layers of the McGuffin. She confronts Marco. He tells her the truth. She
        walks to the door. He says her name. She stops.
      dialogue_history:
      - speaker: Nora
        text: Come with me.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/96e77a23-e19c-4a60-8fc1-518c1696df03.mp3
      - speaker: narrator
        text: You take a breath. Get out of the car. Marco gets out.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You face each other on the street. Neither moves.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: He takes you in his arms.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You let him. Your face against his shoulder. His hand on your back.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: The city behind you. Neither moves.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You pull back. Turn toward the entrance. Go in. He follows.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Morning light. Cool grey-blue. Marco already on his couch, jacket off, coffee in hand.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You come in from the corridor. Sit across from him.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: Your mother called me charming. I thought you should know.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/fa756732-0e3f-44a1-88b3-835a10142f9d.mp3
      - speaker: Nora
        text: Don't take it personally. She tells that to every charming billionaire I'm in a fake relationship with.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/cbddf0c9-8e64-42b8-9515-b37c745fefa6.mp3
      - speaker: Marco
        text: So I am charming.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b7b9d8da-9d51-4202-ace3-ba3ee13a325c.mp3
      - speaker: narrator
        text: You look at him. A small smile. You look down at the table. No answer.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: He sets his coffee down.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: I arranged for the top specialist in New York to see your mother today.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3c2567ef-56eb-455c-858d-b82f7309c268.mp3
      - speaker: Marco
        text: And a private nurse for the next few weeks. She's in good hands.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/37e1178d-ebbb-4ec2-8129-5e4a1d4eab49.mp3
      - speaker: Nora
        text: Thank you.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/6ddb53d3-5e93-432f-bf40-55866ac9cdbf.mp3
      - speaker: Marco
        text: We're a team. We have work to do.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/91aed33f-8a24-40db-8005-14ad48c1d005.mp3
      - speaker: narrator
        text: You open your laptop. You work.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Later. Overhead lights off. Lamp light only. Dark windows, city glow behind Marco.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Documents spread across the coffee table. Everyone else is gone.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You're on your couch, document pile beside you. Marco on the opposite couch, laptop open.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: It's late. We should order something.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/19cd8efb-63cf-4605-8c2b-b4ac6cb33288.mp3
      - speaker: Marco
        text: Already did. Got you cheeseburger and fries, chocolate crepe with extra chocolate.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f04b8e05-f13b-403c-952a-7bb22e22d74a.mp3
      - speaker: narrator
        text: You stop. Look at him.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: How did you know I—
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/af03979b-bb69-49fb-ba5d-8f4ecc8ed479.mp3
      - speaker: Marco
        text: I know.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/dcd14b9d-86b2-42e4-b373-f5678d19fc8c.mp3
      - speaker: narrator
        text: You look at him for a moment. Go back to your documents.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You pick up the next document from your pile. Read. Turn the page. Read again.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You go still.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You read it a second time. Set it down on the table in front of you.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You look across the room at Marco. He has not looked up.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Wait.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f76ef7c4-fb5f-40ff-a121-6ef9c1d8c237.mp3
      - speaker: Nora
        text: Son of a—
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2fb388e7-ca57-4fec-9b1c-c1f6840ce41e.mp3
      - speaker: narrator
        text: You're already on your feet.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You step around the coffee table. Slam the document down in front of his laptop.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: He looks down at it. Goes still. Doesn't close the laptop. Doesn't push it away.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Vela's fee model. Seth's method, dated. Layer one.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/11d11826-4402-461c-b6ea-6b80ab40dcf5.mp3
      - speaker: narrator
        text: You lean forward. Point to the second date on the document.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: You knew what he was doing. Eight weeks before you did anything.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/65163c61-ad31-4d19-b210-c107ebc869aa.mp3
      - speaker: narrator
        text: He looks up at you for the first time.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: Nora—
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f22ea5c4-2048-460c-b497-0e01e47c5654.mp3
      - speaker: narrator
        text: You straighten. Step back one step — not retreating, creating distance to speak.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Eight weeks. While this was running. While those people—
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9d6208ec-f34e-4d66-b938-eff7a363204d.mp3
      - speaker: Marco
        text: I know what was running.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/0407e4fc-68ee-4f0a-abac-92f3894db1fa.mp3
      - speaker: narrator
        text: You stop moving. Look at him.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Then explain why you didn't react.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/ccb07e1f-82e3-4671-86a1-2fb39df1b6ce.mp3
      - speaker: narrator
        text: He looks back down at the document. Pushes the laptop aside. Both hands on the table.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: In that time, we were struggling. Three months from collapse.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/57e1c695-d478-4db4-a9f3-f25cb0b896c3.mp3
      - speaker: Marco
        text: Then all of a sudden our margins exploded. It was a miracle.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/0e988dfe-4147-4c67-83bf-dbfe315c5115.mp3
      - speaker: Nora
        text: It was Seth's model.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/1ee4e830-ead0-4d43-abb2-a9e06a179c7d.mp3
      - speaker: narrator
        text: He stands. Doesn't move toward you — just stands. Eye level now.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: Yes. I found out. I didn't know what to do at first.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c1872b6b-c87f-4d04-a631-8f87ce86b355.mp3
      - speaker: Nora
        text: So you waited.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/216c1988-6b8e-4dbb-926c-9a9160e95e3a.mp3
      - speaker: Marco
        text: I drew the line. I fired him. I made it right.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/e60281f9-edc3-4baf-8490-d739ed501320.mp3
      - speaker: narrator
        text: You step around the coffee table to his side. Closer. You point to the document again.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: You drew it eight weeks late and then you made sure nobody would ever know.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/6458d8e2-c843-4644-8d89-255dcadcb246.mp3
      - speaker: narrator
        text: He doesn't look at the document. He looks at you.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: To protect Vela. Not Seth. Seth was gone.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/0c0b5c7a-bbcc-48b6-b65c-53c6bdb5e4f5.mp3
      - speaker: Nora
        text: You protected yourself.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/bda1c172-7b3d-4867-89e0-aaa78270318a.mp3
      - speaker: narrator
        text: He doesn't answer. Looks away — at the window, the city behind the glass.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Why didn't you tell me.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/14922e41-2e67-4060-817f-cc30ef77fe81.mp3
      - speaker: Marco
        text: You weren't here for this.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/18d9e1df-9dc7-4cea-ba02-bed587b49547.mp3
      - speaker: narrator
        text: You turn away. Move toward your couch — not sitting, putting space between you.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You pick up your document pile, set it down. Your hands need something to do.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: I've been sitting in your meetings. Standing next to you. I was starting to trust you. To —
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5af53b3e-faa5-42e0-88c8-446a39b70087.mp3
      - speaker: narrator
        text: You stop. Set the documents down. Turn back toward him.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: My father had a company. It started doing well. Really well. Suspiciously well.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/92eb878c-1828-4d05-8ded-340fda27093b.mp3
      - speaker: Nora
        text: He knew. He just — kept going.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2beda37a-7063-4d1d-b365-6878dce976fa.mp3
      - speaker: narrator
        text: He has turned back from the window. He is looking at you now.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: What happened?
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/77f1d0ec-5e45-4f1b-b073-dbeb7c302af3.mp3
      - speaker: Nora
        text: We lost everything.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5db6f8fd-03a9-462c-a16e-78fd99fb0fdd.mp3
      - speaker: narrator
        text: Silence. Neither moves.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: It is not the same.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/07fb4d6c-fc5c-4ddb-92a0-8a2be0894a7d.mp3
      - speaker: narrator
        text: You look at him for a long moment. He holds the look.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: I don't know about that.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/0e21c77e-93a0-49b9-a551-e7a0e565e691.mp3
      - speaker: narrator
        text: You cross to your couch. Pick up your bag. Don't rush. Walk to the door.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: Nora.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1b391eae-e50e-4f11-b82d-b3bee0252ea6.mp3
      - speaker: narrator
        text: You stop. Don't turn around.
        location: Marco's Penthouse (day)
      locations:
      - name: Marco's Penthouse (day)
  s_20_hood:
    type: scene
