        location: Law Firm Meeting Room
      - speaker: Nora
        text: That's not the point. Is this about the company or your ego?
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/efaee279-36c1-433f-88d3-5dd76c9bda72.mp3
      - speaker: narrator
        text: He goes still. One beat. Then on his feet, moving.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: You have no idea what I've had to do to get here. None.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/028acb83-c533-48fc-9063-4ce5aafc10fc.mp3
      - speaker: Marco
        text: So don't stand there and question my judgment!
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/a8c606bd-f6d3-4022-8ec6-391ab694c065.mp3
      - speaker: narrator
        text: You don't move. Your chin stays level.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: Marco—
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/fddf3302-bdc1-49a4-a2e6-73da9c56efad.mp3
      - speaker: Marco
        text: This is my company! My fight! You're here because I'm paying you to be here. Nothing more!
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f99c064e-925e-45c1-826d-225ce1424278.mp3
      - speaker: narrator
        text: Silence.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your hand tightens on the document. You set it down carefully. Gather your bag, your phone.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: As you stand, your pen falls off the table to the floor. You don't pick it up.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You walk to the door. Don't look back. Leave.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He stands in the room. Looks at the door you just walked out of. Closes his eyes. Opens them.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: The corridor outside the meeting room. You stop. Your back against the wall. You stay there.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your phone screen lights up. A text from Leila.
        location: Law Firm Meeting Room
      - speaker: Leila
        text: Hey gorgeous. I guess these days must be intense.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/1bfd701a-7cf6-4761-9a6b-ed7fb12a5e45.mp3
      - speaker: Leila
        text: Remember, you're the strongest person I know — love you.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/f9f8d24b-24ed-4cd5-bd98-e09df55bfd86.mp3
      - speaker: narrator
        text: You read it. The corner of your mouth moves up. Stops. You sigh.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You push off the wall. Go back to the door. Push it open.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You stop in the doorway.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Your pen is back on the table — on your side. It was on the floor when you left.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: A coffee cup on your side of the table. It wasn't there when you left.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He is at his seat, eyes on his document. He doesn't look up.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You look at the pen. The coffee. Him. He keeps his eyes on his document.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You cross to your seat. Pick up the pen. Set it back down. Sit. Open your document.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: They work in silence. Then you look up. He looks up. Your eyes meet. Neither speaks.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You pick up the coffee cup. Take a sip. Back to work.
        location: Law Firm Meeting Room
      locations:
      - name: Law Firm Meeting Room
