        text: He puts the phone in his jacket pocket. Looks at you across the room.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: A small gesture toward the sitting area. Come.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: You cross to the couch. He sits. You sit. Angled toward each other. The space between you deliberate.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: He looks at the desk across the room. Not at you.
        location: Marco's Penthouse Office
      - speaker: Marco
        text: Seth went to the press. He says I knew Vela was exploiting our borrowers and said nothing.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b2c45816-ae80-40a6-95d9-40d8f5a91e4c.mp3
      - speaker: Nora
        text: What do you mean? What did he do to these people?
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/38f18a8b-0a07-41ea-b7d1-aab075779902.mp3
      - speaker: narrator
        text: He turns to look at you. Holds your gaze before he answers.
        location: Marco's Penthouse Office
      - speaker: Marco
        text: Vela gives loans to people who can't get them from a bank. It was meant to give people a real shot.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/86070a6a-5921-40a8-a8bc-67029f1c6e68.mp3
      - speaker: Marco
        text: Seth designed the fees so people could never fully pay back what they borrowed.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/fe5ea8ec-b5a2-4c66-8e95-21ff22e4925d.mp3
      - speaker: Marco
        text: He was targeting communities with low income and understanding. People from where I grew up.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/2bc3a29a-636f-4c37-bac2-62349948c4a2.mp3
      - speaker: Marco
        text: When I found out, I kicked him out of the company.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/816dc800-fa90-41da-b290-81edcaee8955.mp3
      - speaker: narrator
        text: You hold his gaze. Don't look away. Don't comment on the last sentence. You stand.
        location: Marco's Penthouse Office
      - speaker: Nora
        text: Okay. Let's find a way to handle this.
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/c36a9c1e-718b-453e-8436-4487efd88f45.mp3
      - speaker: narrator
        text: You pick up your bag. He stands. You cross to his desk. Side by side, documents between you. Both looking down.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: The light through the window has shifted — warm, late afternoon. Both of you working. Neither speaking.
        location: Marco's Penthouse Office
      - speaker: Nora
        text: What does he actually want?
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/0270c2e0-5c8e-4cb4-9781-cab2c86ea53d.mp3
      - speaker: Marco
        text: The company. And he knows how to get it. He comes from their world — the investors, the board.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/95a1c591-14ee-417a-b1ec-a53291e2de2e.mp3
      - speaker: Marco
        text: He knows how they think.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f3d00c35-8a9f-4e6b-8592-8367ffb5ce10.mp3
      - speaker: narrator
        text: You pick up a separate document. Read it. Don't look up.
        location: Marco's Penthouse Office
      - speaker: Nora
        text: But why leak it? He's implicated too.
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/bf0c473e-8d60-4893-9a34-7d579fa382f1.mp3
      - speaker: Marco
        text: Because he's not trying to clear his name. He's trying to destroy mine.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1386e239-e6d2-4b10-a0a6-85fca18e2352.mp3
      - speaker: Marco
        text: The IPO, the investors, everything. If the company burns, he picks up the pieces.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bc10da08-5834-446d-b70f-2f65270de7e6.mp3
      - speaker: narrator
        text: Both set their documents down. A beat of silence. Both looking at the desk.
        location: Marco's Penthouse Office
      - speaker: Nora
        text: You two seem so different. How did you end up working together?
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a83068ef-2a97-43c7-8b24-295971e9956f.mp3
      - speaker: Marco
        text: He had the connections I didn't. I had the idea he couldn't execute without me.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/25e4a84e-ff93-4763-b567-21551564b1f0.mp3
      - speaker: Marco
        text: He was sharp, didn't care where I came from. It made sense at the time.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1f51338b-de82-4c86-8143-944c546935fb.mp3
      - speaker: Nora
        text: And then it didn't.
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/4f429961-9104-4d94-bfe5-ac9805814b7a.mp3
      - speaker: Marco
        text: And then it didn't.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6edc8b88-f87d-40bb-a13f-4f0041259fcc.mp3
      - speaker: narrator
        text: He looks at you. Gets closer.
        location: Marco's Penthouse Office
      - speaker: Marco
        text: Thank you. For being here.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/67fe2a41-1bca-4d7e-b739-8a2b3cb7dd16.mp3
      - speaker: Nora
        text: Well, I literally signed up for this.
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5b6544cb-284a-4b48-af0c-9a1c66029da9.mp3
      - speaker: Marco
        text: I know.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/8495df5a-5b1f-4c76-b276-6f4fe8f5a7a2.mp3
      - speaker: narrator
        text: You reach for a document on his side of the desk. He reaches for the same one.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: Both your hands land on it at the same time.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: He stops. Looks down at your hands on the document. Then looks up at you.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: He goes still — not the controlled stillness of a boardroom. Something that arrives before he can manage it.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: His eyes on your face. Your hand doesn't move. Neither speaks.
        location: Marco's Penthouse Office
      - speaker: narrator
        text: He looks back down at the document. His hand does not move.
        location: Marco's Penthouse Office
      - speaker: Marco
        text: I should have told you about that.
        target: Nora
        location: Marco's Penthouse Office
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/672fc3fb-ac36-4e9a-84db-5733daa9f5c9.mp3
      locations:
      - name: Marco's Penthouse Office
