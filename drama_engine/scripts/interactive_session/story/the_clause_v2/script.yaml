      - speaker: narrator
        text: He extends his hand. The smile stays slightly too long.
        location: Event Space (Night)
      - speaker: Seth
        text: Marco and I built Vela from nothing together.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/6d7133a3-26d8-49df-b147-27f88a39838a.mp3
      - speaker: Seth
        text: Well — until we didn't.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/38778ba1-d551-4a0c-984e-be2afc2d568c.mp3
