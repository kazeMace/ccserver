        location: Marco's Car
      - speaker: Marco
        text: Nora.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/d43ab3f5-881b-4855-afac-e31cabfe2ab3.mp3
