        text: I used to be good at that. I forgot I still was.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f87b440a-6d68-4511-8aae-1ad77bc19b43.mp3
      - speaker: narrator
        text: He turns to look at your profile. You don't look back. He looks out his window.
