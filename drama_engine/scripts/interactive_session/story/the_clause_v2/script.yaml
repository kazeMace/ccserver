    publication:
      messages:
      - audience:
          scope: story
        content:
          text: 医院。母亲的病情让你陷入两难。你拒绝 Marco 的帮助，还是开口请他过来？
    resolution:
      effects:
      - type: increment_state
        path: GAME.round
        amount: 1
    hooks:
      on_enter:
      - type: emit_media
        kind: video
        url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/video/dialogue/83197/upload_ac8af621-a311-4914-8342-ecca508acf2f.mp4
        title: 医院。母亲的病情让你陷入两难。你拒绝 M...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_17.srt
    context:
      synopsis: A press event, a question she answers too honestly, and a phone call in a sealed car that breaks her composure in front of him for the first time. She chooses whether to ask him in.
      dialogue_history:
      - speaker: narrator
        text: Corporate interior. Press event. Investors, cameras, journalists filling the room.
        location: Marco's Car
      - speaker: narrator
        text: You and Marco stand at the podium together. Your arms touch along the full length — shoulder to elbow.
        location: Marco's Car
      - speaker: narrator
        text: Neither of you moves away.
        location: Marco's Car
      - speaker: narrator
        text: "Journalist:\tMr. Diaz, any comment on the recent allegations from your former partner Seth Carver?"
        location: Marco's Car
      - speaker: narrator
        text: Marco looks at the room. Not at the journalist.
        location: Marco's Car
      - speaker: Marco
        text: A lot has been said this week. None of it changes Vela's mission —
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c0dc1698-c5b0-48b1-9f33-1fa3f85d1916.mp3
      - speaker: Marco
        text: break down barriers to credit for communities that need it most.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/a226def4-8aea-4cf3-af56-01a2511a89da.mp3
      - speaker: Marco
        text: Our strategy is clear, and our IPO will launch on schedule.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/38440d94-3a26-41c5-9575-6564241753e8.mp3
      - speaker: narrator
        text: "Journalist:\tMs. Hampton — he has a reputation for being difficult to work with. What's your experience been?"
        location: Marco's Car
      - speaker: narrator
        text: You step slightly forward.
        location: Marco's Car
      - speaker: Nora
        text: Difficult? No. He's the most honest person I've ever worked with.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b8d423bd-ff19-4477-89c2-17bf7be2ad44.mp3
      - speaker: Nora
        text: Honest about what he wants, what he expects, about who he is. That's not difficult — that's just rare.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/88167054-a785-42de-a137-d76519d6580c.mp3
      - speaker: Nora
        text: Do we clash? Yes. In work, in private life, all the time. Is he a constant pain in the ass? For sure.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f55247f1-62d8-408b-848a-ebc38cba7b0d.mp3
      - speaker: Nora
        text: Is it worth it all? Definitely.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a1fa3bd6-5279-4087-9268-9dd0019e7f1b.mp3
      - speaker: narrator
        text: He turns his head toward you while you're still speaking. Looks at you directly — not at the room.
        location: Marco's Car
      - speaker: narrator
        text: When you finish, his hand moves to the podium surface — close to yours, not touching.
        location: Marco's Car
      - speaker: narrator
        text: One beat. Then he turns back to the room.
        location: Marco's Car
      - speaker: narrator
        text: His car. Moving through the city. The press event behind you. Silence.
        location: Marco's Car
      - speaker: narrator
        text: His hand rests on the seat between you — not reaching toward you, just there.
        location: Marco's Car
      - speaker: narrator
        text: You look down at it. He looks out his window. You look out yours.
        location: Marco's Car
      - speaker: narrator
        text: He turns toward you. His body angles slightly in your direction.
        location: Marco's Car
      - speaker: Marco
        text: What you said up there — did you mean it?
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/98afa0aa-3ee4-4038-a7d3-f1275f9d5054.mp3
      - speaker: narrator
        text: You turn to look at him.
        location: Marco's Car
      - speaker: Nora
        text: Every word.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/20b95eba-03d2-4223-917f-f8828e08a504.mp3
      - speaker: narrator
        text: One beat where you sit with what you just confirmed.
        location: Marco's Car
      - speaker: narrator
        text: Your phone rings. You look at the screen. The hospital. You answer immediately.
        location: Marco's Car
      - speaker: narrator
        text: Your free hand presses flat on your knee.
        location: Marco's Car
      - speaker: Nora
        text: Yes. I'm her daughter.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b8f2eacc-f74c-41ec-a171-2cc91f3a78bd.mp3
      - speaker: narrator
        text: Your expression changes. You reach for the water bottle in the door pocket. One sip. Set it down.
        location: Marco's Car
      - speaker: narrator
        text: Your hand is not quite steady.
        location: Marco's Car
      - speaker: Nora
        text: She's in the hospital? How serious —
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a64546e1-5a7f-4413-906c-f180ec0ebe50.mp3
      - speaker: narrator
        text: You stop. Listen. Your eyes fill. You don't look at Marco.
        location: Marco's Car
      - speaker: Nora
        text: I'm coming right now.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/306b283e-dfc8-4ffe-a8d5-a15aaa988805.mp3
      - speaker: narrator
        text: You hang up. Stare at the phone in your lap for one beat. Hands shaking.
        location: Marco's Car
      - speaker: narrator
        text: You turn to Marco.
        location: Marco's Car
      - speaker: Nora
        text: I need... I need—
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/90f112e2-62c7-40ea-98f2-8fcc7f29659a.mp3
      - speaker: narrator
        text: He raises his hand before you can finish.
        location: Marco's Car
      - speaker: Marco
        text: I know.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/19af9dbc-0a8a-49e6-ab58-7dd50bfa25cc.mp3
      - speaker: narrator
        text: He leans forward. Taps the partition glass once. The car changes direction.
        location: Marco's Car
      - speaker: narrator
        text: You look out the window — the route is different. You look at him. He is looking forward.
        location: Marco's Car
      - speaker: narrator
        text: His hand moves from the seat. He places it over yours. You don't pull away.
        location: Marco's Car
      - speaker: narrator
        text: The city moves past the window behind you. Neither speaks.
        location: Marco's Car
      - speaker: narrator
        text: The car pulls up. You open the door. Your hand on the frame.
        location: Marco's Car
      - speaker: Marco
        text: I'm here if you need me.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/8156e048-9850-4f3e-ac40-c060036067a2.mp3
      - speaker: narrator
        text: You stop. Your hand on the open door. You don't look at him. One beat.
        location: Marco's Car
      locations:
      - name: Marco's Car
