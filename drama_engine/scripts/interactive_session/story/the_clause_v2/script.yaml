        title: 夜晚活动现场遭遇攻击。你警告 Marco...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_21.srt
    context:
      synopsis: Day 22, evening. The Vela pre-IPO event. Eight days left. Seth finds Nora and attacks publicly — professional concern first, then the arrangement. Marco crosses the room. Two people discovering
        what they are to each other when nobody is performing.
      dialogue_history:
      - speaker: narrator
        text: The room. Candlelight. People moving, glasses catching the light.
        location: Event Space (Night)
      - speaker: narrator
        text: You're already here — working the room. More confident than Episode 5. Not performing the register.
        location: Event Space (Night)
      - speaker: narrator
        text: Nick finds you. Stops beside you.
        location: Event Space (Night)
      - speaker: Nick
        text: Eight days to the IPO. Can you believe it? Look at him — you'd never know.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/b1d982df-364b-437e-af50-801a59793e8f.mp3
      - speaker: narrator
        text: You both look across the room. Marco mid-conversation, laughing, completely at ease.
        location: Event Space (Night)
      - speaker: Nora
        text: He looks comfortable.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/1d484d6c-146f-4a21-9dab-a0e79577d9bb.mp3
      - speaker: Nick
        text: Oh, believe me. He's not.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/c8f1f684-69de-44cf-a71c-982f27b56b47.mp3
      - speaker: narrator
        text: Marco spots you. Excuses himself. Crosses to you both.
        location: Event Space (Night)
      - speaker: narrator
        text: The three of you briefly off the performance register. Shoulders dropping.
        location: Event Space (Night)
      - speaker: Marco
        text: Tell me one of you is having a worse night than I am.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6d4d900e-387b-4f07-90a9-d4ae316aa417.mp3
      - speaker: Nick
        text: I've shaken 400 hands in the last hour and smiled so much my jaw is going to give out.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/f414450a-0501-4668-89fd-26d8734592fe.mp3
      - speaker: Nora
        text: At least they talked to you.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/4a27fd96-c9ce-49d3-bc2a-4e40c549ed25.mp3
      - speaker: narrator
        text: Marco looks at you. Takes you in for a moment.
        location: Event Space (Night)
      - speaker: Marco
        text: You look good in that dress.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b24dd690-b429-427c-b31b-a61ad1d1fe3c.mp3
      - speaker: Nora
        text: I do. Gift from my boyfriend, apparently.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/43a0f5c0-4419-42e7-b28a-5bbd31c83562.mp3
      - speaker: Marco
        text: Man has taste.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/9b75a940-080a-46fc-8f6d-d295c061385b.mp3
      - speaker: Nick
        text: This is getting embarrassing. I'm going back to shaking hands.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/4f195e12-6332-43e8-ba3b-ff95dc57eaf0.mp3
      - speaker: Marco
        text: Me too. Back in ten.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/3f60bb36-622c-4fea-9911-a7008810b19c.mp3
      - speaker: narrator
        text: Marco drifts back into the party. Nick drifts the other way. You're alone.
        location: Event Space (Night)
      - speaker: narrator
        text: The warmth of the moment gone.
        location: Event Space (Night)
      - speaker: narrator
        text: Seth appears at your side. Same register as Episode 5 — slightly too comfortable for the room.
        location: Event Space (Night)
      - speaker: Seth
        text: Nora!
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/9316790e-7fbf-474e-8c53-02cd97835a2c.mp3
      - speaker: Nora
        text: Seth.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/95a2749e-d75d-46de-b602-2518cb33c551.mp3
      - speaker: Seth
        text: I've been watching you work this room. You're good at this. Better than I expected.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/a0cfc20c-7f75-4408-bc81-463c4d908bf9.mp3
      - speaker: narrator
        text: You don't move. Hold his gaze.
        location: Event Space (Night)
      - speaker: Nora
        text: I'm so honored to live up to your expectations.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/13f08d7b-3e98-4355-b336-4aa3b8e84712.mp3
      - speaker: Seth
        text: Marco's lucky to have someone so committed.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/70e6ac46-7505-4202-ae3c-290182e10b70.mp3
      - speaker: Seth
        text: Although — I do wonder about your judgment. Backing someone like Marco.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/eda0cbde-ede2-490e-8e29-d7d209fed751.mp3
      - speaker: Seth
        text: But I guess everyone has a price.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/5d9b11bf-69bf-41aa-866c-d530f6ac9aa1.mp3
      - speaker: narrator
        text: You step toward him — just one step. Enough to close the distance slightly.
        location: Event Space (Night)
      - speaker: Nora
        text: I know exactly what you're doing. And it won't work.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f66f307f-e5eb-4b07-a6fd-00c5d756422e.mp3
      - speaker: narrator
        text: Seth smiles. Unhurried. Leans in slightly.
        location: Event Space (Night)
      - speaker: Seth
        text: Oh really? I know what the clause says, Nora.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/5cc4e1bb-c1e7-45bc-bf5c-a205057c0cda.mp3
      - speaker: Seth
        text: Everyone in this room is going to know soon enough.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/0ace7213-5ceb-4f58-af47-f0d71acc1795.mp3
      - speaker: Seth
        text: You should think about what that looks like for someone on a partner track.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/3e86d40b-13c2-44d0-9369-893574c0efc7.mp3
      - speaker: narrator
        text: He steps back. Gives you space. The smile stays.
        location: Event Space (Night)
      - speaker: narrator
        text: You hold. You don't break. You don't look away.
        location: Event Space (Night)
      - speaker: narrator
        text: Three seconds of stillness. The effort visible to the audience, not to Seth.
        location: Event Space (Night)
      - speaker: narrator
        text: Marco is across the room. He sees it. Sets down his glass. Starts crossing.
        location: Event Space (Night)
      - speaker: narrator
        text: The open floor makes it visible to everyone. The room sees it. Seth sees it coming.
        location: Event Space (Night)
      - speaker: narrator
        text: Marco reaches you. Stands beside you. Looks at Seth.
        location: Event Space (Night)
      - speaker: Marco
        text: Step away from her. Right now. Or I will move you myself.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/5f13727e-038c-45cf-b5fa-a692c352bd1a.mp3
      - speaker: Seth
        text: Marco, Marco. Are you trying to scare me?
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/765b7fe8-8186-4d37-9be4-12d11820e1cc.mp3
      - speaker: narrator
        text: Marco takes one step forward. Face to face. Doesn't raise his voice.
        location: Event Space (Night)
      - speaker: Marco
        text: If you think I won't drag you out of here in front of all these people —
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c1670dcd-788b-478a-a235-6daa8d5042ff.mp3
      - speaker: Marco
        text: then maybe you don't know me that well.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/a5da15eb-b64d-4e51-ba01-78ea99e423a1.mp3
      - speaker: narrator
        text: A beat. Seth holds the look. Then he glances at you. Leaves. Unhurried. Still smiling.
        location: Event Space (Night)
      - speaker: narrator
        text: You and Marco have moved to the edge of the room. The party continues behind you, indifferent.
        location: Event Space (Night)
      - speaker: narrator
        text: You turn to face him.
        location: Event Space (Night)
      - speaker: Nora
        text: I had that under control.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a67d14d7-183f-4156-8090-5c2bde7524d5.mp3
      - speaker: Marco
        text: I know.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/e5cfbfb9-bbd4-4324-b5c9-2dc4d976898e.mp3
      - speaker: Nora
        text: Then why—
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/df9b4cfe-7a6c-4c32-99e2-deaa010deedd.mp3
      - speaker: Marco
        text: I couldn't watch it.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6f0d5130-955a-4d4f-9919-f21deefaded1.mp3
      - speaker: narrator
        text: A beat. He hears himself say it. He doesn't look away.
        location: Event Space (Night)
      - speaker: narrator
        text: You look at him. Silence. Neither moves.
        location: Event Space (Night)
      - speaker: narrator
        text: The party continues behind you. He doesn't fill the silence. Neither do you.
        location: Event Space (Night)
      locations:
      - name: Event Space (Night)
  s_22_almost_a:
