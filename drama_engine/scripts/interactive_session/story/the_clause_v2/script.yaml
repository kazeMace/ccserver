        title: 次日律所。你带来一份自己起草的合约。是沉...
        scope: public
        subtitle_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/subtitles/node_03.srt
    context:
      synopsis: 'Nora returns with a contract she drafted herself.

        Marco refuses to sign — no private presence requirement.

        She puts the pen down and tells him about her father and the Hampton collapse.

        They argue, she signs.'
      dialogue_history:
      - speaker: narrator
        text: He's already at your desk when you arrive. Reading the contract before you're in the room.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You enter. See him there. Cross to the desk. Take the contract from him without commenting.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He steps back. The corner of his mouth almost moves.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: To make this work — I've prepared a set of rules.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9ab0441d-0207-4f7b-9d46-e2f95e810dfe.mp3
      - speaker: narrator
        text: You set the contract on the desk. Open it. Walk him through the first clause.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: Nothing about this arrangement is disclosed to the press without my approval.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/48454f05-c9bd-4d82-9f00-9977d5c7a863.mp3
      - speaker: Marco
        text: Agreed.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f2c8f66f-0717-4fdb-a775-ecbd0ccb8bb8.mp3
      - speaker: Nora
        text: My professional obligations come first.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/ebe69cf4-c7b1-488d-a8d2-bd86762766c1.mp3
      - speaker: Marco
        text: As long as it doesn't conflict with the schedule.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/830e7808-cc63-4b60-ab9c-0309f1780a0c.mp3
      - speaker: Nora
        text: It won't.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/40badbb2-398a-4ec1-b503-9c06c018c50a.mp3
      - speaker: narrator
        text: He accepts. You move to the next page.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: His hand stops on one page. His finger on a gap in the clauses.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: There's no private presence requirement.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c591fd41-cbe4-4f71-ae03-ff5b54fef7b6.mp3
      - speaker: Nora
        text: Correct.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/476309c3-3044-4bff-898c-ed1fb49f4fa6.mp3
      - speaker: Marco
        text: That won't work.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/2e8e20cb-99d3-4582-9dfa-eae334570112.mp3
      - speaker: Nora
        text: The public appearances cover it.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b886b94d-141d-43fb-951f-85c4bc778fc2.mp3
      - speaker: Marco
        text: No.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b26a4370-803b-4917-810e-abfbd8f626c2.mp3
      - speaker: narrator
        text: He closes the contract. Sets it down. Looks at you.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: I need you fully committed. Privately and publicly.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/76abf594-3aff-4444-9cd5-e59c0e7406cb.mp3
      - speaker: Marco
        text: In my home, at my dinners, in my life — the Hampton name at my side.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/5144ba30-d08f-43b5-b99d-1ad615ef0cfc.mp3
      - speaker: Marco
        text: Not just a face at an event.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f16860c1-5126-419c-abaa-4b9ae6d04cf5.mp3
      - speaker: Nora
        text: That's not what we agreed.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/fca35143-c57b-4917-98f4-ca465499c8b2.mp3
      - speaker: Marco
        text: It's what the deal requires.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/929d6352-3757-420f-a483-66b4f614128c.mp3
      - speaker: Nora
        text: You don't know what you're asking.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/eb3cce62-ba1d-4e6e-ae3b-d14a26104317.mp3
      - speaker: Marco
        text: Then explain it!
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c060d2ff-7ef1-456f-8449-52d5117bd494.mp3
      - speaker: narrator
        text: You put the pen down.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: The Hampton name opened every door in that world.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3d58e399-4100-47b9-9916-186c4620e88d.mp3
      - speaker: Nora
        text: My father was at the center of it. The most trusted man in those rooms.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/7546d474-3d13-471c-804c-fd02a2c99ce8.mp3
      - speaker: Nora
        text: He used that trust. Destroyed everything.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/43eb0953-9a03-48fc-88b9-864aef4751f0.mp3
      - speaker: Nora
        text: And then he—
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/943070ba-5858-478e-9363-510c2dae56ea.mp3
      - speaker: narrator
        text: You stop. A beat. Then look at him directly.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: There are no more Hamptons.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/c46a2906-4dc4-4817-b94e-4981caeb63b4.mp3
      - speaker: Nora
        text: And you're asking me to walk back in.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a500ba39-59a8-4b8e-b510-26fafbd2ed27.mp3
      - speaker: narrator
        text: He doesn't move. Doesn't fill the silence. Doesn't offer you a way out.
        location: Law Firm Meeting Room
      - speaker: Marco
        text: Yes.
        target: Nora
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/afd97d49-a1a3-47ca-aac4-e5371dc093c0.mp3
      - speaker: narrator
        text: You look at the contract. At your name at the top. The pen beside it.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You pick up the pen. Sign.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Hampton. The name on the page.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: He signs. Leaves his copy on your desk without taking it. Moves toward the door.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You watch him go.
        location: Law Firm Meeting Room
      locations:
      - name: Law Firm Meeting Room
