    publication:
      messages:
      - audience:
          scope: story
        content:
          text: 你拒绝了他，独自扛下一切。走在纽约的街头，你把秘密藏得更深。
    resolution:
      effects:
      - type: increment_state
        path: GAME.round
        amount: 1
    context:
      synopsis: Nora refuses Marco's help. The morning after, they work. Late that night, Nora finds the document that exposes both layers of the McGuffin. She confronts Marco. He tells her the truth. She
        walks to the door. He says her name. She stops.
      dialogue_history:
      - speaker: Nora
        text: I don't need your help.
        location: New York Streets
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5fc77ef4-2b13-4a45-9f8d-489fba282da8.mp3
      - speaker: narrator
        text: You get out of the car. Don't look back.
        location: New York Streets
      - speaker: narrator
        text: The entrance door closes behind you. The car doesn't move.
        location: New York Streets
      - speaker: narrator
        text: Morning. Cool grey-blue light. You're already at the coffee table, laptop open.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: I arranged for the top specialist in New York to see your mother today.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/aca5bb13-65f9-4193-a815-7ab2cd986e71.mp3
      - speaker: Marco
        text: And a private nurse for the next few weeks. She's in good hands.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/83647f5a-339f-4690-aa40-6050d796cb91.mp3
      - speaker: narrator
        text: You nod once. No words.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: I need you focused. We have work to do.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/98c50450-052c-42c5-83a3-b6513567fab6.mp3
      - speaker: narrator
        text: You open your document folder. You work.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Later. The overhead lights off. Just the lamps and the city glow through the windows.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Documents everywhere — on the table, stacked on the floor. Just the two of you left.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: It's late. We should order something.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/7d29865b-2ac5-4ce9-b077-208ee30126ba.mp3
      - speaker: Marco
        text: Already did. Got you cheeseburger and fries, chocolate crepe with extra chocolate.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/570c9093-2dbd-4ef6-8dcd-e6bba5bc7f47.mp3
      - speaker: narrator
        text: You stop.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: How did you know I—
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/ecfe68e7-21ef-44bc-b517-9c17ebeeb17d.mp3
      - speaker: Marco
        text: I know.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f1f5ccdc-ba73-42c4-b20a-77dc33ada285.mp3
      - speaker: narrator
        text: You go back to your documents.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: The next one. You read it. Turn the page. Read it again.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Something tightens in the room.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You read it a third time. Set it down.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Wait.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/219601b2-873e-41c7-bbec-c9f02358cd72.mp3
      - speaker: Nora
        text: Son of a—
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b6359389-a0c5-4cc0-a7a1-546daf230115.mp3
      - speaker: narrator
        text: You're already on your feet.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You step around the table. Slam the document down in front of his laptop.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: He goes still. Doesn't close the laptop. Doesn't push it away.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Vela's fee model. Seth's method, dated. Layer one.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/c5061bc6-edbc-4dbf-bf2b-bb88c7145cdc.mp3
      - speaker: narrator
        text: You lean forward. Your finger on the second date.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: You knew what he was doing. Eight weeks before you did anything.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/7bdc9e80-3af4-452f-8ca2-30f59872916b.mp3
      - speaker: Marco
        text: Nora—
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/d929ff60-4c1b-454d-967d-ad4fa5be64d7.mp3
      - speaker: narrator
        text: You straighten. Step back.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Eight weeks. While this was running. While those people—
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/af9ad8fc-8d8a-4474-8074-d2439dccb2a0.mp3
      - speaker: Marco
        text: I know what was running.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/635a0481-edda-4694-8798-35ba6a15c92e.mp3
      - speaker: Nora
        text: Then explain why you didn't react.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3712fde6-6362-4a96-b2e2-d07f2dc83ffc.mp3
      - speaker: narrator
        text: He pushes the laptop aside. Both hands flat on the table.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: In that time, we were struggling. Three months from collapse.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/9f67e1d0-cc6a-4e9c-b919-1eca5f207f9a.mp3
      - speaker: Marco
        text: Then all of a sudden our margins exploded. It was a miracle.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/62ea6417-7bc4-4dec-bb56-701839109320.mp3
      - speaker: Nora
        text: It was Seth's model.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5365b6e0-9787-43b6-be6c-827898591d1b.mp3
      - speaker: narrator
        text: He stands. The two of you eye level now, the document between you.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: Yes. I found out. I didn't know what to do at first.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b5094469-1d8a-4f76-92b7-57a4ab6795f8.mp3
      - speaker: Nora
        text: So you waited.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5c3b3bb7-8155-45a8-a0f4-af080c601940.mp3
      - speaker: Marco
        text: I drew the line. I fired him. I made it right.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/5b72b7a6-f1d8-404a-b4b2-0fb138173f96.mp3
      - speaker: narrator
        text: You move to his side of the table. Your finger back on the page.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: You drew it eight weeks late and then you made sure nobody would ever know.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/06d6242f-d135-4c56-8b79-8e51d5bcf876.mp3
      - speaker: Marco
        text: To protect Vela. Not Seth. Seth was gone.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/016e9b78-e2dd-4fef-b33e-231299efd76c.mp3
      - speaker: Nora
        text: You protected yourself.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/63380ee8-2d49-4f17-82a0-d03322f38ce1.mp3
      - speaker: narrator
        text: He turns toward the window. The city behind the glass.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: Why didn't you tell me.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/504cb8f6-d376-4493-8aa4-dc9f109df1dc.mp3
      - speaker: Marco
        text: You weren't here for this.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b1dea730-9a97-49f5-ba11-82d4fd039e92.mp3
      - speaker: narrator
        text: You move back toward your couch. Pick up your document pile. Set it back down.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: I've been sitting in your meetings. Standing next to you. I was starting to trust you. To —
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/dec01b7e-1f8c-4099-932d-46d8ce6c8455.mp3
      - speaker: narrator
        text: You stop. Turn back toward him.
        location: Marco's Penthouse (day)
      - speaker: Nora
        text: My father had a company. It started doing well. Really well. Suspiciously well.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/ab345da8-6271-4d03-91bf-fab545d5266b.mp3
      - speaker: Nora
        text: He knew. He just — kept going.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/c7fae8b6-854a-4790-97d6-5618352f879e.mp3
      - speaker: narrator
        text: He has turned back from the window.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: What happened?
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1a45f07b-0240-4314-bd06-acfbb468cb81.mp3
      - speaker: Nora
        text: We lost everything.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a48e1e25-f01b-45db-8f40-293eb8c82fa6.mp3
      - speaker: narrator
        text: Silence. Neither of you moves.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: It is not the same.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/f7b55b32-9940-46e7-afe6-f7bee5f52ac9.mp3
      - speaker: Nora
        text: I don't know about that.
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/a2aa5d99-e30f-4f21-9452-7176a6d48b5d.mp3
      - speaker: narrator
        text: You cross to your couch. Pick up your bag. Walk to the door.
        location: Marco's Penthouse (day)
      - speaker: Marco
        text: Nora.
        target: Nora
        location: Marco's Penthouse (day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/99e1cbbe-ac13-4d15-8782-fd941a60bde6.mp3
      - speaker: narrator
        text: You stop. Don't turn around.
        location: Marco's Penthouse (day)
      locations:
      - name: New York Streets
      - name: Marco's Penthouse (day)
