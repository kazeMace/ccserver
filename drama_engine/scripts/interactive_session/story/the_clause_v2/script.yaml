        text: You keep walking. Don't turn.
        location: Marco's Car
      - speaker: Nora
        text: Call my office, Mr. Diaz.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2d52c717-a50e-40a9-bd61-301796c15fed.mp3
      - speaker: narrator
        text: He pushes off the car. Follows — not running. Walking with purpose.
        location: Marco's Car
      - speaker: Marco
        text: One minute.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ff118f4d-364e-4dc9-8516-f31739d81fa7.mp3
      - speaker: narrator
        text: You stop. Don't turn immediately.
        location: Marco's Car
      - speaker: Nora
        text: Ok. One minute.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/072d614a-df87-4118-9e99-f0eaf77f8b50.mp3
      - speaker: narrator
        text: You walk back to the car. Open the door yourself. Get in. He follows.
        location: Marco's Car
      - speaker: narrator
        text: The car moving. City light shifting through the windows. He's looking forward.
        location: Marco's Car
      - speaker: Marco
        text: My IPO closes in thirty days. This is a key moment for my company. For me.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/47b8beb1-8654-4322-a5e3-3059600a8913.mp3
      - speaker: Marco
        text: I can't leave anything to chance.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b6c775d5-51ca-41e5-8549-5b1cad690eda.mp3
      - speaker: Marco
        text: The institutional investors I need — most of them come from old families.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/c7c702d8-c4f0-4a73-8dce-393cfbb49f33.mp3
      - speaker: Marco
        text: They don't trust where I came from. I don't belong in their world.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bc02d555-69ef-427d-9966-d7f5c02feb95.mp3
      - speaker: Marco
        text: But you do. Nora Hampton. I know who you are. Your family is important in that world.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/6e651274-11b5-45ef-87f5-a5c3bb26763d.mp3
      - speaker: Nora
        text: Was important, Mr. Diaz. My family's been broke for a while now.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5b52cf2d-db9e-4c36-b8e0-d33d81042122.mp3
      - speaker: Marco
        text: Marco. Maybe. But your name remains.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b1967f40-48ff-4ab0-b55e-918a793b9f2a.mp3
      - speaker: Marco
        text: Here's my offer. Thirty days. We appear together — dinners, events, the right rooms.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/d919cf4c-1190-430f-be7f-639f08005938.mp3
      - speaker: Marco
        text: As a couple. Credible enough that they believe it.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/d36cf2d5-96b7-4528-be78-d27360f2e355.mp3
      - speaker: Marco
        text: In exchange — your mother's medical bills. All of them. Cleared.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/5b8cc93d-57b8-406e-a37c-a04503c5148a.mp3
      - speaker: narrator
        text: He reaches into his jacket. Places a small piece of paper on the leather between you.
        location: Marco's Car
      - speaker: Marco
        text: That should cover it all.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/7d37ec03-7f3d-47c3-ab92-041fdf5dbd1d.mp3
      - speaker: narrator
        text: You take the paper. Look at it.
        location: Marco's Car
      - speaker: Nora
        text: How do you—
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/737157d4-4028-4635-903b-6da477ed2a4a.mp3
      - speaker: Marco
        text: Doesn't matter.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/da12ed5a-ee8e-40d2-9eda-612287a84fcb.mp3
      - speaker: narrator
        text: You set the paper back. Your hand in your lap closes slightly. Releases.
        location: Marco's Car
      - speaker: narrator
        text: You're looking forward. The city moving past your window.
        location: Marco's Car
      - speaker: Nora
        text: You didn't have to come all the way here.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/fa66c254-6e4b-4a36-8e55-e6566df231d7.mp3
      - speaker: narrator
        text: He turns to look at you.
        location: Marco's Car
      - speaker: Marco
        text: I needed to know who I was dealing with.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/956cbad3-5053-4000-8803-08374c716bc4.mp3
      - speaker: narrator
        text: He looks back out his window. You file it. Look back out yours.
        location: Marco's Car
      - speaker: narrator
        text: The city moving. Neither of you looking at the other.
        location: Marco's Car
      - speaker: narrator
        text: The car stops. Your building visible through the window.
        location: Marco's Car
      - speaker: Nora
        text: I need to think about it.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/83640723-f9bc-43de-9c56-eb73dc4a18e5.mp3
      - speaker: Marco
        text: Good.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/060c2682-a3cd-4568-a816-ecd0b3a46876.mp3
      - speaker: narrator
        text: Your hand on the door handle. You open it. City sound enters — traffic, wind.
        location: Marco's Car
      - speaker: narrator
        text: You stand half in, half out. Still not turned to him.
        location: Marco's Car
      - speaker: Nora
        text: For the record — I was about to nail you on that case.
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9b7abf83-0bd5-4001-985d-f0f7b9eb92b6.mp3
      - speaker: Marco
        text: Maybe.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/d407cbe1-46a7-44d8-8cc3-3db0eb9bd319.mp3
      - speaker: Marco
        text: Not good enough though.
        target: Nora
        location: Marco's Car
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/cbdd32a9-7e61-4032-81a8-b44907a25729.mp3
      - speaker: narrator
        text: You step out. The door closes. City sound cuts off.
        location: Marco's Car
      - speaker: narrator
        text: 'Through the glass from outside: you walking away. Not looking back.'
        location: Marco's Car
      - speaker: narrator
        text: He's watching you through the window. The car doesn't move.
        location: Marco's Car
      - speaker: narrator
        text: You round the corner. Gone. He's still watching the empty street.
        location: Marco's Car
      locations:
      - name: Marco's Car
