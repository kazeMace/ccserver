      - audience:
          scope: story
        content:
          text: 你划清界限。那个几乎发生的吻，最终没有落下。你离开了他的顶层公寓。
    resolution:
      effects:
      - type: increment_state
        path: GAME.round
        amount: 1
    context:
      synopsis: Day 24, late.his penthouse, a late working session, six days left. Two people with their guards completely down. The distance between them reaches its minimum. A phone call stops what was
        about to happen.
      dialogue_history:
      - speaker: narrator
        text: The party still moving behind you. Your back to the room.
        location: Event Space (Night)
      - speaker: narrator
        text: Your voice is quiet. Your hands are still.
        location: Event Space (Night)
      - speaker: Nora
        text: Don't ever do that again.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/f3938b44-1a28-42a7-8d4b-4254c3badfe6.mp3
      - speaker: narrator
        text: He takes a half-step forward.
        location: Event Space (Night)
      - speaker: Marco
        text: He was crossing a line—
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/510e3e7b-4a27-4e4b-8564-bb27d73d4af3.mp3
      - speaker: Nora
        text: I know exactly what he was doing. So did you.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/234fd3a1-877b-4039-809d-5cc00b79dc5a.mp3
      - speaker: Nora
        text: You made me look like a poor girl who can't stand for herself.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/fe3b8553-f676-4378-8aed-48929cc5427e.mp3
      - speaker: narrator
        text: Your voice drops further. The fury underneath it perfectly contained.
        location: Event Space (Night)
      - speaker: Nora
        text: If he uses our contract against me I lose everything. You understand that?
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b01ae29d-0a77-439e-a2cb-6df031289216.mp3
      - speaker: Marco
        text: I'm not going to apologize for it.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/59e36924-e83b-4637-91fb-dd402aed7518.mp3
      - speaker: Nora
        text: I know.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/9ba7f43a-eeb3-4221-8165-5f7003ffe005.mp3
      - speaker: narrator
        text: You turn. Walk back into the room. Head up. The room is still watching.
        location: Event Space (Night)
      - speaker: narrator
        text: Late. Lamp light only. City visible through the windows.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Documents on the coffee table — fewer than before. Both of you on the sofa.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You close a folder. Lean back. Something between you has loosened since the event.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: Six days to the IPO. Still a lot to sort out.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/8a6dab98-3a01-4291-8d93-a2c27ef1e4ec.mp3
      - speaker: Marco
        text: We'll be ready.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1c6ce536-84db-429f-9fd4-0cc4afd2aa97.mp3
      - speaker: narrator
        text: Neither of you reaches for the next document.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: Can I tell you something without you getting offended?
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/e757c1b1-9537-4c98-8bb9-875bb8dce6a9.mp3
      - speaker: narrator
        text: He leans toward you.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: The party. Here. Two weeks ago. When the food came out.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/424cc249-9833-4292-a0ea-d87a0299c585.mp3
      - speaker: Marco
        text: I've never seen anyone move that fast.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/bab589be-f65a-4eb6-91c5-cdec1cb3c078.mp3
      - speaker: narrator
        text: You stare at him.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You were watching me eat.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/3f5408e2-de82-49c2-9ae7-af4ca30d31c3.mp3
      - speaker: Marco
        text: It's okay. Some people just can't help themselves.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/0c343d11-6334-45b3-8fde-aa49ee11c3b6.mp3
      - speaker: narrator
        text: You grab a cushion and throw it at him. He catches it without flinching.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: Let's talk about self control, Mr. Diaz.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5d218a3f-e48d-40e6-ba3a-b45b3ed0213d.mp3
      - speaker: narrator
        text: You stand up. One finger raised. Hands on your hips.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Your voice drops into a flat imitation of his.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You're here because I'm paying you to be here. Nothing more.
        target: Marco
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/98a8ac36-7b58-4646-90cc-518d10e1adc2.mp3
      - speaker: narrator
        text: He goes still. Then he laughs — genuinely, fully, nothing managed about it.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: That's not— that's not what I sound like.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/4956c368-5ac7-41e9-8162-f0031565b807.mp3
      - speaker: narrator
        text: You sit back down. Closer than before.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The laughter fades. The quiet that follows is warmer than usual.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: It's been an adventure.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/00f823af-e875-44c8-bc01-d1bd1e45cda0.mp3
      - speaker: narrator
        text: He nods. Neither of you moves away.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: I'm getting some water.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/57883fd0-bfe7-4d1f-9f15-64654152c521.mp3
      - speaker: narrator
        text: You reach the sink. Turn the tap.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: It sprays hard to the left — catches you across the shoulder and chest.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: What—
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/73e88a34-40bd-4434-bdef-ab328fdff511.mp3
      - speaker: narrator
        text: You twist it. More pressure, different direction. Water everywhere.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You start laughing despite yourself.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He appears in the doorway.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: Let me.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/8deae6a1-a656-443f-acc7-77e8af2fef55.mp3
      - speaker: narrator
        text: He reaches past you. The tap finds him immediately — directly in the face.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Both of you laughing now. The kitchen a mess.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: You made it worse.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/5e953623-fe28-4b50-8d61-94742e657e23.mp3
      - speaker: Marco
        text: I can see that.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/ed9dfcb9-687d-4917-81ca-0116cf007e3a.mp3
      - speaker: narrator
        text: He takes his shirt off and crouches under the sink. A moment of work. The water cuts off.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He straightens. Wipes his hands.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: I know how to fix most things.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/1a20990e-98ce-4a4f-ad0c-36cdf7a62d2b.mp3
      - speaker: Nora
        text: How?
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2941aa84-acee-46a6-9d77-eaf94aea6482.mp3
      - speaker: Marco
        text: Poor people habit. You fix it yourself or it stays broken.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/433a3098-45da-4a8e-bc0b-00debfbf6e8c.mp3
      - speaker: narrator
        text: The laughter is gone.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He's standing close. No shirt. The city glittering through the windows behind you.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You're aware of the exact distance between you.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: You had a moment to step back. You didn't take it.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He notices. He leans in.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: Your faces are a few inches apart. Neither of you speaks. Neither pulls away.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: The phone on the counter lights up. NICK.
        location: Marco's Penthouse (Night)
      - speaker: Marco
        text: Hey.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/28c78cd5-a776-411b-9d0f-ef51568bd942.mp3
      - speaker: Nick
        text: Closing dinner venue's confirmed. We're ready.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/5071/3f83f289-0154-435b-bf33-4a2167766d50.mp3
      - speaker: Marco
        text: Good.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/93928d07-3097-4219-a269-86f052a7ddf7.mp3
      - speaker: narrator
        text: He sets the phone down. The space between you feels different now.
        location: Marco's Penthouse (Night)
      - speaker: Nora
        text: I should get going.
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/4bbfb60a-3d46-4894-b84b-a748e3fb9f51.mp3
      - speaker: Marco
        text: Yeah.
        target: Nora
        location: Marco's Penthouse (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/8d5c3394-218b-46d8-a685-31c26188650a.mp3
      - speaker: narrator
        text: You reach for the dish towel. Dry your hands slowly. Don't look at him.
        location: Marco's Penthouse (Night)
      - speaker: narrator
        text: He picks up his shirt from the counter. Leaves the room.
        location: Marco's Penthouse (Night)
      locations:
      - name: Event Space (Night)
      - name: Marco's Penthouse (Night)
