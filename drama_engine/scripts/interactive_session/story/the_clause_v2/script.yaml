    context:
      synopsis: 'Nora almost says something as Marco walks out.

        She stops herself and stays alone with his copy of the contract.

        At the penthouse: Marco arranges a stylist at his penthouse — Nora needs a gown and a look that signals she belongs in the old money investor world for the upcoming dinner. Marco gives Nora a solid
        gold cuff bracelet to wear as part of the presentation.'
      dialogue_history:
      - speaker: narrator
        text: He's at the door. About to leave.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: Mr. Diaz?
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/0db34a3e-d120-4490-a327-f0d8f9e6c0f2.mp3
      - speaker: narrator
        text: He turns.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: I...
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/07387e1a-8411-4272-b876-ca67f93ab44e.mp3
      - speaker: narrator
        text: You look at him.
        location: Law Firm Meeting Room
      - speaker: Nora
        text: No. Nothing.
        location: Law Firm Meeting Room
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/cbca02d4-1a02-4530-b034-3a3049365a3d.mp3
      - speaker: narrator
        text: He holds the look one beat. Leaves.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: You're alone. You look at the contract. Pick up his copy — the one he left deliberately.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Both hands holding it.
        location: Law Firm Meeting Room
      - speaker: narrator
        text: Elevator doors open. The penthouse in front of you — the height, the city, the scale.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: You step out. Stop. Take it in.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: One second of genuine impression. Then you reassemble and walk in.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: The stylist already working. Marco across the room with documents. He doesn't look up.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: Mid-conversation he crosses to a lamp at a slightly wrong angle. Adjusts it. Returns to his documents.
        location: Marco's Penthouse (day)
      - speaker: narrator
        text: He doesn't think about it. You watch him. Don't look away immediately.
