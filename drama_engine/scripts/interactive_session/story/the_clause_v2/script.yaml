        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/6fc5e766-0658-4ba8-9d36-4fcbe74f7899.mp3
      - speaker: Leila
        text: Tell me you got laid.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/e083caa7-30a1-4bca-8588-6ef6a147b31e.mp3
      - speaker: Nora
        text: Leila!
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/e8fba991-8b5c-4503-b92b-f7331af937d8.mp3
      - speaker: Leila
        text: I'm just asking! We both know you'd need it.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/cac6b023-2229-476d-b729-daec4802c6be.mp3
      - speaker: Nora
        text: Okay. We're done here.
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/841705f8-a644-4693-8157-bc3cf5c1381d.mp3
      - speaker: Leila
        text: Sorry sorry sorry.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/00827a25-3833-40eb-8ae3-5af5b621652d.mp3
      - speaker: narrator
        text: She sits on the sofa. Gets comfortable. Feet slightly up. She's not going anywhere.
        location: Nora's Apartment (Day)
      - speaker: Leila
        text: Okay. For real. Did you have a good time?
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/694f6937-ea0d-4ed2-b331-6e577d3b7f0f.mp3
      - speaker: Nora
        text: It was ok.
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/b39bf967-10b5-4119-8df1-2da2e833852b.mp3
      - speaker: Leila
        text: Really?
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/f7870fe7-4958-4a97-ab4d-54444aa4e7ae.mp3
      - speaker: narrator
        text: You look away.
        location: Nora's Apartment (Day)
      - speaker: Nora
        text: '...maybe I did. A little.'
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/51cb5f14-cfa5-4e8b-babc-d07f11fb1c9a.mp3
      - speaker: Leila
        text: And him. Did you like him.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/1d1caa05-c3f3-4a56-8254-d4b0f042f29d.mp3
      - speaker: Nora
        text: I...
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/d0e86c7d-8e7e-48a3-9d7e-b643de231088.mp3
      - speaker: Leila
        text: I'm not asking if you want to marry him. I'm asking if you liked him.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/bc5b58cf-fac7-4ff1-9c70-f9b38b89396b.mp3
      - speaker: Nora
        text: He's not that bad. But not my type.
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/094772fe-4cb2-40ec-ad59-4a202339f99c.mp3
      - speaker: narrator
        text: She looks at you for a long moment. Then her eyes drop to your wrist.
        location: Nora's Apartment (Day)
      - speaker: Leila
        text: Nora.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/53afe738-dca3-4ce6-ae7d-e9516e463a4e.mp3
      - speaker: Leila
        text: You still have the bracelet on.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/159fc21f-feb4-474c-8218-f36f2f923777.mp3
      - speaker: narrator
        text: You look down at your wrist.
        location: Nora's Apartment (Day)
      - speaker: Leila
        text: You came home last night. You slept. You woke up. You still have it on.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/5a4cc8ca-3423-4ca1-ada6-9e92bf58d3e3.mp3
      - speaker: narrator
        text: You say nothing. That's the answer.
        location: Nora's Apartment (Day)
      - speaker: narrator
        text: She stands. Crosses to the dress. Folds it carefully. Sets it back on the chair.
        location: Nora's Apartment (Day)
      - speaker: narrator
        text: Turns to face you. Doesn't move toward you.
        location: Nora's Apartment (Day)
      - speaker: Leila
        text: How long before you forget you're playing a part?
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/ef9e2138-6801-47ae-b645-7225f50a51a4.mp3
      - speaker: Nora
        text: I know exactly what I'm doing.
        target: Marco
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/bb12a99e-93d8-4347-a353-86264a53d7df.mp3
      - speaker: Leila
        text: I know you do.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/52c8c29d-d74d-4237-a77e-06795d5fa38f.mp3
      - speaker: Leila
        text: That's not what I asked.
        target: Nora
        location: Nora's Apartment (Day)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/63588/d323ff3b-99c1-4d69-91a3-6331a468b76a.mp3
      - speaker: narrator
        text: You don't answer. She doesn't look away.
        location: Nora's Apartment (Day)
      locations:
      - name: Nora's Apartment (Day)
