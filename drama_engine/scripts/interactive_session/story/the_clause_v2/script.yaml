        text: Nora Hampton.
        target: Leila
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/698a6144-e7de-463b-ae26-bfd9f73f2c4b.mp3
      - speaker: Seth
        text: I know who you are.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/fe65491b-b526-44ee-967b-22381d26a880.mp3
      - speaker: narrator
        text: He looks at you — assessing, not admiring. One beat where the calculation shows before the smile covers it.
        location: Event Space (Night)
      - speaker: Seth
        text: Marco has excellent taste.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/e127d4f3-aa7b-42b4-8e8e-f7930702520c.mp3
      - speaker: Seth
        text: Hope he's not too stressed about this IPO. There's a lot at stake.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/ae5303b9-6f76-43bb-bfa1-eef3c0cfbcea.mp3
      - speaker: Seth
        text: But that's Marco — nothing stops him. It's something we always had in common.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/30082/abd3903b-e09a-4c19-8da4-0c7b40f9a3eb.mp3
      - speaker: narrator
        text: He raises his glass slightly. Moves on.
        location: Event Space (Night)
      - speaker: narrator
        text: A document on a nearby table — briefly visible when a guest shifts.
        location: Event Space (Night)
      - speaker: narrator
        text: An odd date on the page. You see it. Have no context. File it.
        location: Event Space (Night)
      - speaker: narrator
        text: A woman stops you. Sixty-five. White hair. Warm, socially polished.
        location: Event Space (Night)
      - speaker: narrator
        text: An older woman stops you — white-haired, warm, socially polished. She says your name like it's an occasion.
        location: Event Space (Night)
      - speaker: narrator
        text: You answer. We don't hear it. The woman's expression stays warm. Satisfied. She moves on.
        location: Event Space (Night)
      - speaker: narrator
        text: The moment she turns away — one second. The mask drops. Anger or grief or both.
        location: Event Space (Night)
      - speaker: narrator
        text: Then gone. You reassemble.
        location: Event Space (Night)
      - speaker: narrator
        text: Marco is across the room. He watched the whole exchange.
        location: Event Space (Night)
      - speaker: narrator
        text: He saw your face the moment she turned. The one second before you reassembled.
        location: Event Space (Night)
      - speaker: narrator
        text: Something filing away that isn't professional.
        location: Event Space (Night)
      - speaker: narrator
        text: The car moving. City amber through the windows. Both looking out your respective windows.
        location: Event Space (Night)
      - speaker: narrator
        text: Silence.
        location: Event Space (Night)
