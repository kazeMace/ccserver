        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/188ce988-c30a-4896-940a-41818a12a8b4.mp3
      - speaker: Marco
        text: Yes.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/b65b108e-0af9-4185-a486-222b8f090a8c.mp3
      - speaker: Nora
        text: He seems to know you well.
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/72965/2ca16111-4adb-4066-abf7-98b79dc6a72a.mp3
      - speaker: Marco
        text: We founded Vela together.
        target: Nora
        location: Event Space (Night)
        sound_url: https://assets.castloop.ai/xnarrator-game/editor-beta/1780365598/0/audio/dialogue/28296/cbab195c-c2ea-4509-a0d7-d4cc99ec182c.mp3
      - speaker: Marco
        text: I don't want to talk about it. What I can say is — you can't trust this man.
        target: Nora
